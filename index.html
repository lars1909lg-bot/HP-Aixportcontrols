    // --- Data Context ---
    const DataContext = createContext(null);
    const AuthContext = createContext(null);
    const I18nContext = createContext(null);

    // --- i18n Hook ---
    function I18nProvider({ children }) {
        const [language, setLanguage] = useState(APP_CONFIG.defaultLanguage);

        const t = useCallback((key) => {
            return I18N[language]?.[key] || I18N.de[key] || key;
        }, [language]);

        const tCountry = useCallback((code) => {
            return COUNTRIES[code]?.[language] || code;
        }, [language]);

        const tStatus = useCallback((status) => {
            return t("status_" + status);
        }, [t]);

        const tRisk = useCallback((risk) => {
            return t("risk_" + risk);
        }, [t]);

        const value = useMemo(() => ({
            language, setLanguage, t, tCountry, tStatus, tRisk
        }), [language, t, tCountry, tStatus, tRisk]);

        return React.createElement(I18nContext.Provider, { value }, children);
    }

    function useI18n() {
        return useContext(I18nContext);
    }

    // --- Auth Provider ---
    function AuthProvider({ children }) {
        const [currentUser, setCurrentUser] = useState(null);
        const data = useContext(DataContext);

        const login = useCallback((userId) => {
            const user = data.db.users.find(u => u.id === userId);
            if (user) {
                setCurrentUser(user);
                data.addAuditEntry({
                    userId: user.id,
                    action: "login",
                    details: { email: user.email, role: user.role }
                });
            }
        }, [data]);

        const logout = useCallback(() => {
            if (currentUser) {
                data.addAuditEntry({
                    userId: currentUser.id,
                    action: "logout",
                    details: { email: currentUser.email }
                });
            }
            setCurrentUser(null);
        }, [currentUser, data]);

        const hasRole = useCallback((role) => {
            return currentUser?.role === role;
        }, [currentUser]);

        const canAccess = useCallback((page) => {
            if (!currentUser) return false;
            const role = currentUser.role;
            const accessMap = {
                dashboard: ["case_creator", "approver", "admin"],
                cases: ["case_creator", "approver", "admin"],
                approver_inbox: ["approver", "admin"],
                admin: ["admin"],
                settings: ["case_creator", "approver", "admin"],
                monitoring: ["case_creator", "approver", "admin"],
            };
            return (accessMap[page] || []).includes(role);
        }, [currentUser]);

        const value = useMemo(() => ({
            currentUser, login, logout, hasRole, canAccess
        }), [currentUser, login, logout, hasRole, canAccess]);

        return React.createElement(AuthContext.Provider, { value }, children);
    }

    function useAuth() {
        return useContext(AuthContext);
    }

    // --- Data Provider ---
    function DataProvider({ children }) {
        const [db, setDb] = useState(INITIAL_DB);

        const generateCaseNumber = useCallback((id) => {
            const year = new Date().getFullYear();
            return `AXC-${year}-${String(id).padStart(5, "0")}`;
        }, []);

        const addAuditEntry = useCallback((entry) => {
            setDb(prev => {
                const id = prev.nextIds.audit;
                const newEntry = {
                    id,
                    tenantId: 1,
                    caseId: entry.caseId || null,
                    userId: entry.userId,
                    action: entry.action,
                    details: entry.details || {},
                    timestamp: new Date().toISOString(),
                };
                return {
                    ...prev,
                    auditLog: [...prev.auditLog, newEntry],
                    nextIds: { ...prev.nextIds, audit: id + 1 }
                };
            });
        }, []);

        const createCase = useCallback((caseData, userId) => {
            let newCase = null;
            setDb(prev => {
                const id = prev.nextIds.cases;
                newCase = {
                    id,
                    tenantId: 1,
                    caseNumber: generateCaseNumber(id),
                    status: "draft",
                    parties: caseData.parties || [],
                    dispatchCountry: caseData.dispatchCountry || "",
                    destinationCountry: caseData.destinationCountry || "",
                    transitCountries: caseData.transitCountries || [],
                    productType: caseData.productType || "",
                    productDescription: caseData.productDescription || "",
                    productCategory: caseData.productCategory || "",
                    endUseDescription: caseData.endUseDescription || "",
                    plannedDeliveryDate: caseData.plannedDeliveryDate || null,
                    quantity: caseData.quantity || null,
                    valueEur: caseData.valueEur || null,
                    createdBy: userId,
                    approvedBy: null,
                    approvalRationale: "",
                    rejectionRationale: "",
                    revocationRationale: "",
                    legalSourceVersionId: null,
                    sourceOutdatedWarning: false,
                    sourceOutdatedNote: "",
                    riskLevel: null,
                    overallAssessment: "",
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    assessedAt: null,
                    approvedAt: null,
                    recheckRequired: false,
                    lastRecheckAt: null,
                    caseFileHash: null,
                };
                const auditId = prev.nextIds.audit;
                const auditEntry = {
                    id: auditId, tenantId: 1, caseId: id, userId,
                    action: "case_created",
                    details: { caseNumber: newCase.caseNumber },
                    timestamp: new Date().toISOString(),
                };
                return {
                    ...prev,
                    cases: [...prev.cases, newCase],
                    auditLog: [...prev.auditLog, auditEntry],
                    nextIds: { ...prev.nextIds, cases: id + 1, audit: auditId + 1 }
                };
            });
            return newCase;
        }, [generateCaseNumber]);

        const updateCase = useCallback((caseId, updates, userId, auditAction) => {
            setDb(prev => {
                const cases = prev.cases.map(c => {
                    if (c.id === caseId) {
                        return { ...c, ...updates, updatedAt: new Date().toISOString() };
                    }
                    return c;
                });
                const auditEntries = [...prev.auditLog];
                let nextAuditId = prev.nextIds.audit;
                if (auditAction) {
                    auditEntries.push({
                        id: nextAuditId,
                        tenantId: 1, caseId, userId,
                        action: auditAction,
                        details: updates.auditDetails || {},
                        timestamp: new Date().toISOString(),
                    });
                    nextAuditId++;
                }
                return {
                    ...prev,
                    cases,
                    auditLog: auditEntries,
                    nextIds: { ...prev.nextIds, audit: nextAuditId }
                };
            });
        }, []);

        const transitionCaseStatus = useCallback((caseId, newStatus, userId, extraUpdates = {}) => {
            const c = db.cases.find(c => c.id === caseId);
            if (!c) return false;
            const allowed = ALLOWED_TRANSITIONS[c.status] || [];
            if (!allowed.includes(newStatus)) return false;

            const auditActionMap = {
                in_pruefung: c.status === "draft" ? "case_submitted" : "case_returned",
                bewertet: "assessment_completed",
                freigegeben: "approval_granted",
                abgelehnt: "approval_denied",
                archiviert: "case_exported",
            };

            const updates = {
                status: newStatus,
                ...extraUpdates,
            };

            if (newStatus === "bewertet") updates.assessedAt = new Date().toISOString();
            if (newStatus === "freigegeben") {
                updates.approvedAt = new Date().toISOString();
                updates.approvedBy = userId;
            }

            updateCase(caseId, updates, userId, auditActionMap[newStatus]);
            return true;
        }, [db.cases, updateCase]);

        const updateConfig = useCallback((configUpdates) => {
            setDb(prev => ({
                ...prev,
                config: { ...prev.config, ...configUpdates }

        }, []);

        const getCasesForUser = useCallback((user) => {
            if (!user) return [];
            if (user.role === "admin") return db.cases;

            return db.cases.filter(c => c.createdBy === user.id);

        const getAuditLogForCase = useCallback((caseId) => {

                return {

        const getClassificationResultsForCase = useCallback((caseId) => {

        const getDocumentsForCase = useCallback((caseId) => {

        const value = useMemo(() => ({
            db, addAuditEntry, createCase, updateCase, transitionCaseStatus,
            updateConfig, getCasesForUser, getAuditLogForCase, getUserById,
            generateCaseNumber, addScreeningResult, updateScreeningDecision,
            addEmbargoResult, getScreeningResultsForCase, getEmbargoResultsForCase,
            isSourceStale, addClassificationResult, updateClassificationDecision,
            getClassificationResultsForCase, addEndUseResult, getEndUseResultsForCase,
            addDocument, getDocumentsForCase,
        }), [db, addAuditEntry, createCase, updateCase, transitionCaseStatus,
             updateConfig, getCasesForUser, getAuditLogForCase, getUserById,
             generateCaseNumber, addScreeningResult, updateScreeningDecision,
             addEmbargoResult, getScreeningResultsForCase, getEmbargoResultsForCase,
             isSourceStale, addClassificationResult, updateClassificationDecision,
             getClassificationResultsForCase, addEndUseResult, getEndUseResultsForCase,
             addDocument, getDocumentsForCase]);

        return React.createElement(DataContext.Provider, { value }, children);
    }

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3: HILFSFUNKTIONEN
    // ══════════════════════════════════════════════════════════════════

    function formatDate(isoString) {
        if (!isoString) return "—";
        const d = new Date(isoString);
        return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })
            + " " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    }

    function formatDateShort(isoString) {
        if (!isoString) return "—";
        return new Date(isoString).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3b: SCREENING SERVICE (Fuzzy Matching)
    // ══════════════════════════════════════════════════════════════════

    const ScreeningService = {
        // Levenshtein distance for fuzzy matching
        _levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1, dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0));
            return dp[m][n];
        },

        // Calculate similarity score (0.0–1.0)
        _similarity(query, target) {
            const q = query.toLowerCase().trim();
            const t = target.toLowerCase().trim();
            if (q === t) return 1.0;
            if (t.includes(q) || q.includes(t)) return 0.9;
            const maxLen = Math.max(q.length, t.length);
            if (maxLen === 0) return 0;
            const dist = this._levenshtein(q, t);
            return Math.max(0, 1 - dist / maxLen);
        },

        // Screen a single name against all sanctions demo data
        screenEntity(entityName, entityCountry) {
            const results = [];
            const threshold = 0.80; // 80% Projektanforderung

            for (const entry of SANCTIONS_DEMO_DATA) {
                // Check main name
                let bestScore = this._similarity(entityName, entry.name);
                let matchedName = entry.name;
                let matchType = bestScore === 1.0 ? "exact" : "fuzzy";

                // Check aliases
                for (const alias of (entry.aliases || [])) {
                    const aliasScore = this._similarity(entityName, alias);
                    if (aliasScore > bestScore) {
                        bestScore = aliasScore;
                        matchedName = alias;
                        matchType = aliasScore === 1.0 ? "exact" : "alias";
                    }
                }

                // Country boost: if countries match, boost score slightly
                if (entityCountry && entry.country === entityCountry && bestScore > 0.6) {
                    bestScore = Math.min(1.0, bestScore + 0.05);
                }

                if (bestScore >= threshold) {
                    results.push({
                        sanctionEntry: entry,
                        matchScore: Math.round(bestScore * 100) / 100,
                        matchedName,
                        matchType,
                    });
                }
            }

            return results.sort((a, b) => b.matchScore - a.matchScore);
        },

        // Screen all parties in a case
        screenCase(caseData) {
            const allResults = [];
            for (const party of (caseData.parties || [])) {
                if (!party.name.trim()) continue;
                const matches = this.screenEntity(party.name, party.country);
                allResults.push({
                    partyName: party.name,
                    partyCountry: party.country,
                    partyRole: party.role,
                    matches,
                    hasMatch: matches.length > 0,
                });
            }
            return allResults;
        },
    };

    // Embargo check service
    const EmbargoService = {
        checkCountry(countryCode) {
            const embargo = EMBARGO_COUNTRIES[countryCode];
            if (!embargo) {
                return { isRestricted: false, resultStatus: "unauffaellig" };
            }
            return {
                isRestricted: true,
                restrictionType: embargo.restrictionType,
                label_de: embargo.label_de,
                label_en: embargo.label_en,
                regulations: embargo.regulations,
                resultStatus: embargo.restrictionType === "full_embargo" ? "kritisch" : "pruefpflichtig",
            };
        },

        checkCase(caseData) {
            const results = [];
            const countries = [
                { code: caseData.destinationCountry, role: "destination" },
                { code: caseData.dispatchCountry, role: "dispatch" },
                ...(caseData.transitCountries || []).map(c => ({ code: c, role: "transit" })),
            ];
            for (const { code, role } of countries) {
                if (!code) continue;
                const check = this.checkCountry(code);
                results.push({ countryCode: code, countryRole: role, ...check });
            }
            return results;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3c: PII-GATE (Pflicht vor jedem LLM-Call)
    // ══════════════════════════════════════════════════════════════════

    const PIIGate = {
        ALLOWED_FIELDS: [
            "product_type", "product_description", "product_category",
            "destination_country", "dispatch_country", "end_use_description",
            "quantity", "value_eur",
        ],

        BLOCKED_PATTERNS: [
            /[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g,               // Email
            /\b\d{2,4}[-\/]\d{2,4}[-\/]\d{2,4}\b/g,                            // Dates (DOB)
            /\+?\d{1,3}[-.\s]?\(?\d{1,4}\)?[-.\s]?\d{3,}[-.\s]?\d{2,}/g,     // Phone
            /\b[A-Z]{2}\d{6,9}\b/g,                                            // Passport-like
            /\b\d{3}[-.]?\d{2}[-.]?\d{4}\b/g,                                  // SSN-like
            /\bDE\d{9}\b/g,                                                     // German VAT
        ],

        filterPayload(caseData) {
            const filtered = {};
            for (const field of this.ALLOWED_FIELDS) {
                const camelField = field.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
                if (caseData[camelField] !== undefined) {
                    filtered[field] = caseData[camelField];
                }
            }
            return filtered;
        },

        scanForPii(payload) {
            const text = JSON.stringify(payload);
            for (const pattern of this.BLOCKED_PATTERNS) {
                pattern.lastIndex = 0;
                if (pattern.test(text)) return true;
            }
            return false;
        },

        gate(caseData) {
            const filtered = this.filterPayload(caseData);
            const hasPii = this.scanForPii(filtered);
            return { filtered, blocked: hasPii };
        }
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3d: LLM-SERVICE (Multi-Model, Browser-seitig)
    // ══════════════════════════════════════════════════════════════════

    const LLMService = {
        MODEL_ROUTING: {
            classification: "claude",
            screening_eval: "openai",
            regulation_check: "claude",
            enduse_assessment: "claude",
            decision_reasoning: "claude",
            case_file_text: "claude",
            data_extraction: "openai",
        },

        async call(agentType, payload, config, caseId, userId) {
            // 1. PII Gate
            const { filtered, blocked } = PIIGate.gate(payload);
            if (blocked) {
                return { success: false, error: "PII detected — request blocked", blocked: true };
            }

            const model = this.MODEL_ROUTING[agentType] || "claude";

            // 2. Check API key availability
            if (model === "claude" && !config.anthropicApiKey) {
                return { success: false, error: "No Anthropic API key configured", noKey: true };
            }
            if (model === "openai" && !config.openaiApiKey) {
                return { success: false, error: "No OpenAI API key configured", noKey: true };
            }

            // 3. Make API call
            try {
                if (model === "claude") {
                    return await this._callClaude(agentType, filtered, config.anthropicApiKey);
                } else {
                    return await this._callOpenAI(agentType, filtered, config.openaiApiKey);
                }
            } catch (err) {
                return { success: false, error: err.message };
            }
        },

        async _callClaude(agentType, payload, apiKey) {
            const systemPrompts = {
                classification: `You are an export control classification assistant. Analyze the product description and suggest applicable Dual-Use categories (EU VO 2021/821 Annex I, categories 0-9), German Export List (AL) numbers, and HS codes. Respond ONLY in JSON format: {"dualUseNumber": "string or empty", "alNumber": "string or empty", "hsCode": "string or empty", "confidence": 0.0-1.0, "reasoning": "string", "isDualUse": boolean}`,
                enduse_assessment: `You are an export control end-use assessment assistant. Analyze the provided end-use information and red flag responses to assess risk. Respond ONLY in JSON format: {"riskLevel": "low|medium|high|critical", "reasoning": "string", "catchAllRelevant": boolean, "recommendations": ["string"]}`,
            };

            const resp = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": apiKey,
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true",
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-6-20250514",
                    max_tokens: 1024,
                    system: systemPrompts[agentType] || "You are an export control assistant. Respond in JSON.",
                    messages: [{ role: "user", content: JSON.stringify(payload) }],
                }),
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`Claude API error ${resp.status}: ${errText.substring(0, 200)}`);
            }

            const data = await resp.json();
            const text = data.content?.[0]?.text || "";
            try {
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                return { success: true, data: JSON.parse(jsonMatch?.[0] || "{}"), raw: text, model: "claude" };
            } catch {
                return { success: true, data: {}, raw: text, model: "claude" };
            }
        },

        async _callOpenAI(agentType, payload, apiKey) {
            const resp = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    response_format: { type: "json_object" },
                    messages: [
                        { role: "system", content: "You are an export control assistant. Respond in JSON." },
                        { role: "user", content: JSON.stringify(payload) },
                    ],
                }),
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`OpenAI API error ${resp.status}: ${errText.substring(0, 200)}`);
            }

            const data = await resp.json();
            const text = data.choices?.[0]?.message?.content || "{}";
            try {
                return { success: true, data: JSON.parse(text), raw: text, model: "openai" };
            } catch {
                return { success: true, data: {}, raw: text, model: "openai" };
            }
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3e: KLASSIFIZIERUNGS-SERVICE (Säule 3, Demo + KI)
    // ══════════════════════════════════════════════════════════════════

    const ClassificationService = {
        // Demo-basierte Keyword-Klassifizierung (funktioniert ohne API-Key)
        classifyByKeywords(productDescription, productType) {
            const desc = (productDescription || "").toLowerCase();
            const matches = [];

            for (const [cat, info] of Object.entries(DUAL_USE_CATEGORIES)) {
                const matchedKeywords = info.keywords.filter(kw => desc.includes(kw.toLowerCase()));
                if (matchedKeywords.length > 0) {
                    matches.push({
                        category: cat,
                        label_de: info.de,
                        label_en: info.en,
                        matchedKeywords,
                        score: Math.min(0.95, 0.6 + matchedKeywords.length * 0.1),
                    });
                }
            }

            matches.sort((a, b) => b.score - a.score);

            if (matches.length === 0) {
                return {
                    isDualUse: false,
                    dualUseNumber: "",
                    alNumber: "",
                    hsCode: "",
                    confidence: 0.85,
                    reasoning_de: "Keine Dual-Use-relevanten Schlüsselwörter in der Produktbeschreibung erkannt.",
                    reasoning_en: "No Dual-Use-relevant keywords detected in product description.",
                    categories: [],
                };
            }

            const top = matches[0];
            return {
                isDualUse: true,
                dualUseNumber: `${top.category}A001`,
                alNumber: "",
                hsCode: "",
                confidence: top.score,
                reasoning_de: `Schlüsselwörter [${top.matchedKeywords.join(", ")}] deuten auf ${top.label_de} hin.`,
                reasoning_en: `Keywords [${top.matchedKeywords.join(", ")}] suggest ${top.label_en}.`,
                categories: matches,
            };
        },

        // KI-basierte Klassifizierung (braucht API-Key)
        async classifyWithAI(caseData, config) {
            const result = await LLMService.call("classification", caseData, config);
            if (!result.success) return null;
            return result.data;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3f: ENDVERWENDUNGS-SERVICE (Säule 4)
    // ══════════════════════════════════════════════════════════════════

    const EndUseService = {
        evaluateResponses(responses) {
            const redFlags = [];
            let catchAllRelevant = false;

            for (const resp of responses) {
                const question = RED_FLAG_CATALOG.find(q => q.id === resp.questionId);
                if (!question) continue;

                if (resp.answer === "yes" || (resp.answer === "unknown" && question.critical)) {
                    redFlags.push({
                        questionId: resp.questionId,
                        question_de: question.de,
                        question_en: question.en,
                        answer: resp.answer,
                        critical: question.critical,
                        category: question.category,
                    });
                }

                // Catch-All triggers
                if (resp.answer === "yes" && ["enduse", "enduser", "route"].includes(question.category) && question.critical) {
                    catchAllRelevant = true;
                }
            }

            let resultStatus = "unauffaellig";
            if (redFlags.length > 0) {
                resultStatus = redFlags.some(rf => rf.critical && rf.answer === "yes") ? "kritisch" : "pruefpflichtig";
            }

            return { redFlags, catchAllRelevant, resultStatus };
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3g: DECISION-AGENT (Konsolidierte Bewertung)
    // ══════════════════════════════════════════════════════════════════

    const DecisionAgent = {
        // Evaluate pillar status: returns { status, label }
        _pillarStatus(results, type) {
            if (!results || results.length === 0) return { status: "pending", label: "—" };
            if (type === "screening") {
                const hasMatch = results.some(r => r.matchScore >= 0.80 && r.trefferDecision !== "cleared");
                const hasUnresolved = results.some(r => r.matchScore >= 0.80 && !r.trefferDecision);
                if (hasUnresolved) return { status: "pending", label: "pending" };
                if (hasMatch) return { status: "kritisch", label: "kritisch" };
                return { status: "unauffaellig", label: "unauffaellig" };
            }
            if (type === "embargo") {
                const worst = results.reduce((w, r) => {
                    if (r.resultStatus === "kritisch") return "kritisch";
                    if (r.resultStatus === "pruefpflichtig" && w !== "kritisch") return "pruefpflichtig";
                    return w;
                }, "unauffaellig");
                return { status: worst, label: worst };
            }
            if (type === "classification") {
                const r = results[0];
                if (!r) return { status: "pending", label: "—" };
                if (r.userAcceptedKi === null) return { status: "pending", label: "pending" };
                if (r.userDecisionDualUse) return { status: "pruefpflichtig", label: "pruefpflichtig" };
                return { status: "unauffaellig", label: "unauffaellig" };
            }
            if (type === "enduse") {
                const r = results[0];
                if (!r) return { status: "pending", label: "—" };
                return { status: r.resultStatus, label: r.resultStatus };
            }
            return { status: "pending", label: "—" };
        },

        // Consolidated risk assessment
        assess(screeningResults, embargoResults, classificationResults, endUseResults, language) {
            const pillars = {
                screening: this._pillarStatus(screeningResults, "screening"),
                embargo: this._pillarStatus(embargoResults, "embargo"),
                classification: this._pillarStatus(classificationResults, "classification"),
                enduse: this._pillarStatus(endUseResults, "enduse"),
            };

            // Check if all pillars are resolved
            const allResolved = Object.values(pillars).every(p => p.status !== "pending");

            // Calculate overall risk
            const statusPriority = { kritisch: 4, pruefpflichtig: 3, unauffaellig: 1, pending: 0 };
            const maxStatus = Object.values(pillars).reduce((max, p) =>
                (statusPriority[p.status] || 0) > (statusPriority[max] || 0) ? p.status : max, "unauffaellig");

            let riskLevel = "low";
            if (maxStatus === "kritisch") riskLevel = "critical";
            else if (maxStatus === "pruefpflichtig") riskLevel = "medium";

            // Check for blocked (any unresolved escalated screening match)
            const hasEscalated = (screeningResults || []).some(r => r.trefferDecision === "escalated");
            if (hasEscalated) riskLevel = "high";

            // Check for blocked (full embargo)
            const hasFullEmbargo = (embargoResults || []).some(r => r.restrictionType === "full_embargo");
            if (hasFullEmbargo) riskLevel = "blocked";

            // Generate reasoning
            const reasons = [];
            if (language === "de") {
                if (pillars.screening.status === "kritisch") reasons.push("Sanktionslistentreffer nicht freigegeben");
                if (pillars.screening.status === "unauffaellig") reasons.push("Keine Sanktionslistentreffer");
                if (pillars.embargo.status === "kritisch") reasons.push("Embargo-Restriktionen erkannt");
                if (pillars.embargo.status === "pruefpflichtig") reasons.push("Teilembargo — sektorale Prüfung erforderlich");
                if (pillars.embargo.status === "unauffaellig") reasons.push("Keine Länderbeschränkungen");
                if (pillars.classification.status === "pruefpflichtig") reasons.push("Dual-Use-Relevanz identifiziert — Genehmigungsprüfung empfohlen");
                if (pillars.classification.status === "unauffaellig") reasons.push("Keine Dual-Use-Relevanz");
                if (pillars.enduse.status === "kritisch") reasons.push("Kritische Red Flags bei Endverwendung — Catch-All prüfen");
                if (pillars.enduse.status === "pruefpflichtig") reasons.push("Red Flags bei Endverwendung erkannt");
                if (pillars.enduse.status === "unauffaellig") reasons.push("Keine Endverwendungsrisiken erkannt");
            } else {
                if (pillars.screening.status === "kritisch") reasons.push("Sanctions list match not cleared");
                if (pillars.screening.status === "unauffaellig") reasons.push("No sanctions list matches");
                if (pillars.embargo.status === "kritisch") reasons.push("Embargo restrictions detected");
                if (pillars.embargo.status === "pruefpflichtig") reasons.push("Partial embargo — sectoral review required");
                if (pillars.embargo.status === "unauffaellig") reasons.push("No country restrictions");
                if (pillars.classification.status === "pruefpflichtig") reasons.push("Dual-Use relevance identified — license review recommended");
                if (pillars.classification.status === "unauffaellig") reasons.push("No Dual-Use relevance");
                if (pillars.enduse.status === "kritisch") reasons.push("Critical Red Flags in end use — check Catch-All");
                if (pillars.enduse.status === "pruefpflichtig") reasons.push("Red Flags in end use detected");
                if (pillars.enduse.status === "unauffaellig") reasons.push("No end use risks detected");
            }

            return {
                pillars,
                allResolved,
                riskLevel,
                reasoning: reasons.join(". ") + ".",
                overallAssessment: reasons.join("; "),
            };
        },
    };

    // Re-Check Rule: > 5 business days
    const ReCheckRule = {
        isRecheckRequired(plannedDeliveryDate) {
            if (!plannedDeliveryDate) return false;
            const delivery = new Date(plannedDeliveryDate);
            const now = new Date();
            let businessDays = 0;
            const current = new Date(now);
            while (current < delivery) {
                current.setDate(current.getDate() + 1);
                const day = current.getDay();
                if (day !== 0 && day !== 6) businessDays++;
                if (businessDays > 5) return true;
            }
            return false;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3h: PDF-GENERATOR (Case File)
    // ══════════════════════════════════════════════════════════════════

    const PDFGenerator = {
        // Simple SHA-256 via SubtleCrypto
        async _sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
        },

        async generate(caseData, screeningResults, embargoResults, classificationResults,
                        endUseResults, auditEntries, assessment, users, t, language, countries) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const margin = 15;
            const contentW = pageW - margin * 2;
            let y = margin;

            const addFooter = () => {
                const pageCount = doc.getNumberOfPages();
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setTextColor(150);
                    doc.text(`${t("pdf_page")} ${i} / ${pageCount}`, pageW - margin, pageH - 8, { align: "right" });
                    doc.text(t("pdf_disclaimer"), margin, pageH - 8);
                }
            };

            const checkPage = (needed = 20) => {
                if (y + needed > pageH - 20) { doc.addPage(); y = margin; }
            };

            const sectionTitle = (text) => {
                checkPage(15);
                y += 4;
                doc.setFontSize(11);
                doc.setTextColor(30, 64, 175);
                doc.setFont(undefined, "bold");
                doc.text(text, margin, y);
                y += 2;
                doc.setDrawColor(30, 64, 175);
                doc.line(margin, y, pageW - margin, y);
                y += 6;
                doc.setTextColor(0);
                doc.setFont(undefined, "normal");
                doc.setFontSize(9);
            };

            const addField = (label, value) => {
                checkPage(8);
                doc.setFont(undefined, "bold");
                doc.text(label + ":", margin, y);
                doc.setFont(undefined, "normal");
                const labelW = doc.getTextWidth(label + ": ");
                const lines = doc.splitTextToSize(String(value || "—"), contentW - labelW);
                doc.text(lines, margin + labelW, y);
                y += lines.length * 4.5;
            };

            const tCountry = (code) => countries[code]?.[language] || code;

            // ── Header ──
            doc.setFontSize(16);
            doc.setTextColor(30, 64, 175);
            doc.setFont(undefined, "bold");
            doc.text("AIxportControls", margin, y);
            y += 6;
            doc.setFontSize(12);
            doc.setTextColor(60);
            doc.text(t("pdf_title"), margin, y);
            y += 8;
            doc.setFontSize(9);
            doc.setTextColor(0);
            doc.setFont(undefined, "normal");
            addField(t("pdf_case_number"), caseData.caseNumber);
            addField("Status", caseData.status);
            addField(t("pdf_generated_at"), new Date().toLocaleString(language === "de" ? "de-DE" : "en-GB"));
            y += 2;

            // ── 1. Parties ──
            sectionTitle(t("pdf_section_parties"));
            if (caseData.parties.length > 0) {
                const partyRows = caseData.parties.map(p => [
                    p.name, p.role, tCountry(p.country), p.address || "—"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [[language === "de" ? "Name" : "Name", language === "de" ? "Rolle" : "Role",
                            language === "de" ? "Land" : "Country", language === "de" ? "Adresse" : "Address"]],
                    body: partyRows,
                    styles: { fontSize: 8, cellPadding: 2 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text("—", margin, y); y += 5;
            }

            // ── 2. Countries ──
            sectionTitle(t("pdf_section_countries"));
            addField(language === "de" ? "Versandland" : "Dispatch Country", tCountry(caseData.dispatchCountry));
            addField(language === "de" ? "Bestimmungsland" : "Destination Country", tCountry(caseData.destinationCountry));
            if (caseData.transitCountries.length > 0) {
                addField(language === "de" ? "Transitländer" : "Transit Countries",
                    caseData.transitCountries.map(c => tCountry(c)).join(", "));
            }

            // ── 3. Product ──
            sectionTitle(t("pdf_section_product"));
            addField(language === "de" ? "Produkttyp" : "Product Type", caseData.productType);
            addField(language === "de" ? "Beschreibung" : "Description", caseData.productDescription);
            if (caseData.endUseDescription) {
                addField(language === "de" ? "Endverwendung" : "End Use", caseData.endUseDescription);
            }
            if (caseData.valueEur) {
                addField(language === "de" ? "Warenwert" : "Value", `€ ${Number(caseData.valueEur).toLocaleString("de-DE", { minimumFractionDigits: 2 })}`);
            }

            // ── 4. Screening (Pillar 1) ──
            sectionTitle(t("pdf_section_screening"));
            if (screeningResults.length > 0) {
                const sRows = screeningResults.map(r => [
                    r.entityName, r.listSource, `${Math.round(r.matchScore * 100)}%`,
                    r.matchedEntry || "—", r.trefferDecision || "pending"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [["Entity", language === "de" ? "Liste" : "List", "Score",
                            language === "de" ? "Treffer" : "Match", "Decision"]],
                    body: sRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 5. Embargo (Pillar 2) ──
            sectionTitle(t("pdf_section_embargo"));
            if (embargoResults.length > 0) {
                const eRows = embargoResults.map(r => [
                    r.countryName, r.countryRole, r.restrictionType || "none",
                    r.resultStatus, r.applicableRegulations || "—"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [[language === "de" ? "Land" : "Country", language === "de" ? "Rolle" : "Role",
                            language === "de" ? "Restriktion" : "Restriction", "Status",
                            language === "de" ? "Verordnungen" : "Regulations"]],
                    body: eRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 6. Classification (Pillar 3) ──
            sectionTitle(t("pdf_section_classification"));
            if (classificationResults.length > 0) {
                const cl = classificationResults[0];
                addField("Dual-Use Nr.", cl.kiSuggestionDualUse || "—");
                addField("AL-Nr.", cl.kiSuggestionAl || "—");
                addField("HS-Code", cl.kiSuggestionHsCode || "—");
                addField(language === "de" ? "KI-Konfidenz" : "AI Confidence", `${Math.round((cl.kiConfidence || 0) * 100)}%`);
                addField(language === "de" ? "KI-Begründung" : "AI Reasoning", cl.kiReasoning || "—");
                if (cl.userAcceptedKi !== null) {
                    addField(language === "de" ? "Nutzer-Entscheidung" : "User Decision",
                        cl.userAcceptedKi ? (language === "de" ? "KI-Vorschlag übernommen" : "AI suggestion accepted") :
                        (language === "de" ? "Manuell geändert" : "Manually modified"));
                    if (cl.userDecisionDualUse) addField("User Dual-Use", cl.userDecisionDualUse);
                }
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 7. End Use (Pillar 4) ──
            sectionTitle(t("pdf_section_enduse"));
            if (endUseResults.length > 0) {
                const eu = endUseResults[0];
                addField("Status", eu.resultStatus);
                addField("Catch-All", eu.catchAllRelevant
                    ? (language === "de" ? "Relevant" : "Relevant")
                    : (language === "de" ? "Nicht relevant" : "Not relevant"));
                if (eu.redFlagsDetected.length > 0) {
                    addField("Red Flags", eu.redFlagsDetected.length.toString());
                    eu.redFlagsDetected.forEach((rf, i) => {
                        checkPage(8);
                        doc.text(`  ${i + 1}. ${language === "de" ? rf.question_de : rf.question_en} [${rf.answer}]${rf.critical ? " ⚠" : ""}`,
                            margin + 2, y);
                        y += 4;
                    });
                }
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 8. Consolidated Assessment ──
            sectionTitle(t("pdf_section_assessment"));
            if (assessment || caseData.consolidatedAssessment) {
                const riskLevel = assessment?.riskLevel || caseData.riskLevel || "—";
                const reasoning = assessment?.reasoning || caseData.consolidatedReasoning || "—";
                addField(language === "de" ? "Risikostufe" : "Risk Level", riskLevel.toUpperCase());
                addField(language === "de" ? "Begründung" : "Reasoning", reasoning);
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 9. Approval ──
            sectionTitle(t("pdf_section_approval"));
            if (caseData.approvedBy) {
                const approver = users.find(u => u.id === caseData.approvedBy);
                addField(language === "de" ? "Status" : "Status", caseData.status);
                addField(language === "de" ? "Entscheider" : "Decided by", approver?.fullName || "—");
                if (caseData.approvalRationale) addField(language === "de" ? "Begründung" : "Rationale", caseData.approvalRationale);
                if (caseData.rejectionRationale) addField(language === "de" ? "Ablehnungsgrund" : "Rejection reason", caseData.rejectionRationale);
            } else {
                doc.text(language === "de" ? "Noch nicht entschieden" : "Not yet decided", margin, y); y += 5;
            }

            // ── 10. Audit Trail ──
            sectionTitle(t("pdf_section_audit"));
            if (auditEntries.length > 0) {
                const aRows = auditEntries.map(e => {
                    const user = users.find(u => u.id === e.userId);
                    return [
                        new Date(e.timestamp).toLocaleString(language === "de" ? "de-DE" : "en-GB"),
                        user?.fullName || "System",
                        t("audit_action_" + e.action),
                    ];
                });
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [["Timestamp", language === "de" ? "Benutzer" : "User", "Action"]],
                    body: aRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            }

            // ── Footer + Hash ──
            addFooter();

            // Compute SHA-256 of PDF content
            const pdfBytes = doc.output("arraybuffer");
            const hashHex = await this._sha256(new TextDecoder("latin1").decode(new Uint8Array(pdfBytes)));

            // Add hash on last page
            const lastPage = doc.getNumberOfPages();
            doc.setPage(lastPage);
            checkPage(15);
            y += 4;
            doc.setFontSize(7);
            doc.setTextColor(100);
            doc.text(`${t("pdf_hash_label")}: ${hashHex}`, margin, pageH - 15);

            // Save
            doc.save(`${caseData.caseNumber}_CaseFile_${language.toUpperCase()}.pdf`);
            return hashHex;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3i: CSV-IMPORT
    // ══════════════════════════════════════════════════════════════════

    const CSVService = {
        getTemplate() {
            return "productDescription;productType;destinationCountry;dispatchCountry;endUseDescription;partyName;partyRole;partyCountry;valueEur;plannedDeliveryDate\n" +
                   '"Industrial Valve";"dual_use_good";"RU";"DE";"Oil refinery";"Acme Corp";"buyer";"RU";"50000";"2026-06-01"';
        },

        parse(csvText) {
            const lines = csvText.trim().split("\n");
            if (lines.length < 2) throw new Error("CSV must have header + at least one row");

            const header = lines[0].split(";").map(h => h.replace(/"/g, "").trim());
            const required = ["productDescription", "destinationCountry"];
            for (const r of required) {
                if (!header.includes(r)) throw new Error(`Missing required column: ${r}`);
            }

            const cases = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = lines[i].split(";").map(v => v.replace(/^"|"$/g, "").trim());
                const row = {};
                header.forEach((h, idx) => { row[h] = vals[idx] || ""; });

                cases.push({
                    productDescription: row.productDescription || "",
                    productType: row.productType || "other",
                    destinationCountry: row.destinationCountry || "",
                    dispatchCountry: row.dispatchCountry || "DE",
                    transitCountries: row.transitCountries ? row.transitCountries.split(",").map(s => s.trim()) : [],
                    endUseDescription: row.endUseDescription || "",
                    valueEur: row.valueEur ? parseFloat(row.valueEur) : null,
                    plannedDeliveryDate: row.plannedDeliveryDate || "",
                    parties: row.partyName ? [{
                        name: row.partyName,
                        role: row.partyRole || "buyer",
                        country: row.partyCountry || row.destinationCountry,
                        address: row.partyAddress || "",
                    }] : [],
                });
            }
            return cases;
        },

        downloadTemplate() {
            const blob = new Blob([this.getTemplate()], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "AIxportControls_Import_Template.csv";
            a.click();
            URL.revokeObjectURL(url);
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3j: DATEI-HANDLER (PDF-Textextraktion)
    // ══════════════════════════════════════════════════════════════════

    const FileHandler = {
        async extractText(file) {
            if (file.type === "application/pdf") {
                return this._extractPdfText(file);
            }
            // Plain text / CSV
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve({ text: e.target.result, pages: 1, type: file.type });
                reader.readAsText(file);
            });
        },

        async _extractPdfText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            const numPages = pdf.numPages;
            for (let i = 1; i <= numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(item => item.str).join(" ");
                fullText += pageText + "\n\n";
            }
            return { text: fullText.trim(), pages: numPages, type: "application/pdf" };
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3k: DOCUMENT ANALYZER (Informationsextraktion)
    // ══════════════════════════════════════════════════════════════════

    const DocumentAnalyzer = {
        // Build reverse lookup: country name → ISO code
        _countryLookup: null,
        _getCountryLookup() {
            if (this._countryLookup) return this._countryLookup;
            this._countryLookup = {};
            for (const [code, names] of Object.entries(COUNTRIES)) {
                this._countryLookup[names.de.toLowerCase()] = code;
                this._countryLookup[names.en.toLowerCase()] = code;
                this._countryLookup[code.toLowerCase()] = code;
            }
            return this._countryLookup;
        },

        // Dual-use patterns (AL-Nummern, EAR/ECCN, Wassenaar categories)
        DUALUSE_PATTERNS: [
            /\b(\d[A-E]\d{3}[a-z]?)\b/gi,                    // AL-Nummern (z.B. 1A004, 3A001)
            /\bECCN\s*[\s:]*(\d[A-E]\d{3}[a-z]?)\b/gi,       // ECCN references
            /\bEAR\s*99\b/gi,                                  // EAR99
            /\bAL[\s-]*(?:Teil|Part)\s*I?\s*(?:Abschnitt|Section)\s*[A-E]/gi,
            /\b(?:Dual[\s-]?Use|doppelter Verwendungszweck|Güter mit doppeltem Verwendungszweck)\b/gi,
            /\b(?:Ausfuhrliste|Export Control List|Exportkontroll[\s-]?liste)\b/gi,
            /\bWassenaar\b/gi,
            /\b(?:Missile Technology|MTCR|Nuclear Suppliers Group|NSG|Australia Group)\b/gi,
        ],

        // Product/technical keywords
        PRODUCT_KEYWORDS: [
            /\b(?:CNC|Laser|Frequenzumrichter|frequency converter|Turbine|Zentrifuge|centrifuge)\b/gi,
            /\b(?:Kryptographie|cryptography|encryption|Verschlüsselung|cipher)\b/gi,
            /\b(?:Spektrometer|spectrometer|Oszilloskop|oscilloscope|Sensor)\b/gi,
            /\b(?:Werkzeugmaschine|machine tool|Drehmaschine|lathe|Fräsmaschine|milling)\b/gi,
            /\b(?:Radar|Sonar|thermal imaging|Wärmebildkamera|night vision|Nachtsicht)\b/gi,
            /\b(?:Drohne|drone|UAV|unmanned|unbemannt)\b/gi,
            /\b(?:Kohlefaser|carbon fiber|Aramid|Kevlar|Maraging[\s-]?[Ss]tahl|maraging steel)\b/gi,
        ],

        // End-use red flag keywords
        ENDUSE_KEYWORDS: {
            de: ["militärisch", "verteidigung", "rüstung", "waffe", "munition", "nuklear", "atomar",
                 "chemisch", "biologisch", "rakete", "sprengstoff", "überwachung", "abhör"],
            en: ["military", "defense", "defence", "weapon", "ammunition", "nuclear", "atomic",
                 "chemical", "biological", "missile", "explosive", "surveillance", "intercept"],
        },

        // Value patterns
        VALUE_PATTERNS: [
            /(?:EUR|€|USD|\$|GBP|£)\s*([\d.,]+(?:\s*(?:Mio|Mrd|k|M|B))?)/gi,
            /([\d.,]+)\s*(?:EUR|Euro|USD|Dollar|GBP)/gi,
            /(?:Wert|value|amount|Betrag|Gesamtwert|total)[\s:]*(?:EUR|€|USD|\$)?\s*([\d.,]+)/gi,
        ],

        // Date patterns
        DATE_PATTERNS: [
            /\b(\d{4}[-/.]\d{2}[-/.]\d{2})\b/g,
            /\b(\d{2}[-/.]\d{2}[-/.]\d{4})\b/g,
            /(?:Lieferdatum|Liefertermin|delivery date|delivery|Datum|date)[\s:]*(\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4})/gi,
        ],

        // Company/entity patterns
        ENTITY_PATTERNS: [
            /\b([A-ZÄÖÜ][a-zäöüß]+(?:\s+[A-ZÄÖÜ][a-zäöüß]+)*)\s+(?:GmbH|AG|SE|Ltd|LLC|Inc|Corp|Co\.|OOO|OAO|ZAO|PAO|S\.?A\.?|B\.?V\.?|N\.?V\.?|Pty|PLC|KG|oHG|e\.K\.|UG)\b/g,
            /\b([A-ZÄÖÜ][a-zäöüß]+(?:\s+[A-ZÄÖÜ][a-zäöüß]+)*)\s+(?:Institute|Institut|University|Universität|Research|Center|Centre|Laboratory|Laboratorium)\b/g,
            /(?:Firma|Company|Käufer|Buyer|Empfänger|Recipient|Endnutzer|End[\s-]?user|Auftraggeber|Customer|Lieferant|Supplier|Organisation)[\s:]+([A-ZÄÖÜ][\w\s&.,'-]{2,50}?)(?:\n|,|\.|;)/gi,
        ],

        analyze(text, language = "de") {
            const result = {
                parties: [],
                countries: [],
                products: [],
                values: [],
                dates: [],
                endUseHints: [],
                dualUseHints: [],
                rawText: text,
                confidence: "low",
            };

            if (!text || text.trim().length < 10) return result;

            const normalizedText = text.replace(/\s+/g, " ");

            // 1. Extract parties/companies
            for (const pattern of this.ENTITY_PATTERNS) {
                const regex = new RegExp(pattern.source, pattern.flags);
                let match;
                while ((match = regex.exec(normalizedText)) !== null) {
                    const name = (match[1] || match[0]).trim();
                    if (name.length > 2 && name.length < 80 && !result.parties.some(p => p.name === name)) {
                        result.parties.push({ name, source: "document" });
                    }
                }
            }

            // 2. Extract countries
            const countryLookup = this._getCountryLookup();
            const words = normalizedText.split(/[\s,;.()]+/);
            // Check multi-word country names first
            for (const [name, code] of Object.entries(countryLookup)) {
                if (name.length > 2) { // Skip ISO codes for now
                    const idx = normalizedText.toLowerCase().indexOf(name);
                    if (idx !== -1 && !result.countries.includes(code)) {
                        result.countries.push(code);
                    }
                }
            }
            // Check ISO codes in text (standalone 2-letter codes)
            for (const word of words) {
                const clean = word.replace(/[^A-Z]/g, "");
                if (clean.length === 2 && COUNTRIES[clean] && !result.countries.includes(clean)) {
                    result.countries.push(clean);
                }
            }

            // 3. Extract product/technical info
            for (const pattern of this.PRODUCT_KEYWORDS) {
                const regex = new RegExp(pattern.source, pattern.flags);
                let match;
                while ((match = regex.exec(normalizedText)) !== null) {
                    const term = match[0].trim();
                    if (!result.products.includes(term)) result.products.push(term);
                }
            }

            // 4. Extract dual-use indicators
            for (const pattern of this.DUALUSE_PATTERNS) {
                const regex = new RegExp(pattern.source, pattern.flags);
                let match;
                while ((match = regex.exec(normalizedText)) !== null) {
                    const term = match[0].trim();
                    if (!result.dualUseHints.includes(term)) result.dualUseHints.push(term);
                }
            }

            // 5. Extract values
            for (const pattern of this.VALUE_PATTERNS) {
                const regex = new RegExp(pattern.source, pattern.flags);
                let match;
                while ((match = regex.exec(normalizedText)) !== null) {
                    const val = (match[1] || match[0]).trim();
                    if (!result.values.includes(val)) result.values.push(val);
                }
            }

            // 6. Extract dates
            for (const pattern of this.DATE_PATTERNS) {
                const regex = new RegExp(pattern.source, pattern.flags);
                let match;
                while ((match = regex.exec(normalizedText)) !== null) {
                    const dateStr = (match[1] || match[0]).trim();
                    if (!result.dates.includes(dateStr)) result.dates.push(dateStr);
                }
            }

            // 7. Extract end-use hints
            const langKeywords = this.ENDUSE_KEYWORDS[language] || this.ENDUSE_KEYWORDS.en;
            const allKeywords = [...this.ENDUSE_KEYWORDS.de, ...this.ENDUSE_KEYWORDS.en];
            for (const keyword of allKeywords) {
                const idx = normalizedText.toLowerCase().indexOf(keyword);
                if (idx !== -1) {
                    // Get surrounding context (50 chars before/after)
                    const start = Math.max(0, idx - 50);
                    const end = Math.min(normalizedText.length, idx + keyword.length + 50);
                    const context = "..." + normalizedText.slice(start, end).trim() + "...";
                    if (!result.endUseHints.some(h => h.keyword === keyword)) {
                        result.endUseHints.push({ keyword, context });
                    }
                }
            }

            // Calculate confidence
            const infoCount = result.parties.length + result.countries.length +
                result.products.length + result.values.length + result.dualUseHints.length;
            if (infoCount >= 5) result.confidence = "high";
            else if (infoCount >= 2) result.confidence = "medium";

            return result;
        },

        // Build a formatted summary string for the chat
        formatSummary(analysis, t, language) {
            const lines = [];

            if (analysis.parties.length > 0) {
                lines.push(t("chat_analysis_parties_found"));
                analysis.parties.forEach(p => lines.push(`  • ${p.name}`));
                lines.push("");
            }

            if (analysis.countries.length > 0) {
                lines.push(t("chat_analysis_countries_found"));
                analysis.countries.forEach(c => {
                    const name = COUNTRIES[c]?.[language] || c;
                    lines.push(`  • ${name} (${c})`);
                });
                lines.push("");
            }

            if (analysis.products.length > 0) {
                lines.push(t("chat_analysis_products_found"));
                analysis.products.forEach(p => lines.push(`  • ${p}`));
                lines.push("");
            }

            if (analysis.dualUseHints.length > 0) {
                lines.push(t("chat_analysis_dualuse_found"));
                analysis.dualUseHints.forEach(d => lines.push(`  • ${d}`));
                lines.push("");
            }

            if (analysis.values.length > 0) {
                lines.push(t("chat_analysis_values_found"));
                analysis.values.forEach(v => lines.push(`  • ${v}`));
                lines.push("");
            }

            if (analysis.dates.length > 0) {
                lines.push(t("chat_analysis_dates_found"));
                analysis.dates.forEach(d => lines.push(`  • ${d}`));
                lines.push("");
            }

            if (analysis.endUseHints.length > 0) {
                lines.push(t("chat_analysis_enduse_found"));
                analysis.endUseHints.forEach(h => lines.push(`  • _"${h.context}"_`));
                lines.push("");
            }

            return lines.join("\n");
        },

        // Convert analysis to caseData partial
        toCaseData(analysis) {
            const data = {};

            // Set parties — try to find their country from context in raw text
            if (analysis.parties.length > 0) {
                data.parties = analysis.parties.map((p, i) => {
                    let partyCountry = "";
                    // Look for country mentions near the party name in the raw text (before and after)
                    const idx = analysis.rawText.indexOf(p.name);
                    if (idx !== -1) {
                        const start = Math.max(0, idx - 150);
                        const end = Math.min(analysis.rawText.length, idx + p.name.length + 200);
                        const nearby = analysis.rawText.slice(start, end).toLowerCase();
                        for (const code of analysis.countries) {
                            const cNames = COUNTRIES[code];
                            if (cNames && (nearby.includes(cNames.de.toLowerCase()) || nearby.includes(cNames.en.toLowerCase()) || nearby.includes(code.toLowerCase()))) {
                                partyCountry = code;
                                break;
                            }
                        }
                    }
                    // Fallback: first non-DE country for first buyer, etc.
                    if (!partyCountry) {
                        const nonDE = analysis.countries.filter(c => c !== "DE");
                        partyCountry = i === 0 && nonDE.length > 0 ? nonDE[0] : (analysis.countries[0] || "");
                    }
                    // Detect role from context
                    let role = i === 0 ? "buyer" : "enduser";
                    if (idx !== -1) {
                        const contextBefore = analysis.rawText.slice(Math.max(0, idx - 100), idx).toLowerCase();
                        if (/end[\s-]?(?:nutzer|user|verwend)/.test(contextBefore)) role = "enduser";
                        else if (/lieferant|supplier|verkäufer|seller/.test(contextBefore)) role = "buyer";
                        else if (/vermittler|intermediary|agent|freight|spedit/.test(contextBefore)) role = "intermediary";
                    }
                    return { name: p.name, country: partyCountry, role };
                });
            }

            // Set countries — detect transit from text context
            const nonDECountries = analysis.countries.filter(c => c !== "DE");
            if (nonDECountries.length > 0) {
                data.destinationCountry = nonDECountries[0];
            }
            if (analysis.countries.includes("DE")) {
                data.dispatchCountry = "DE";
            }
            // Check for transit countries mentioned in raw text
            const transitCountries = [];
            const rawLower = (analysis.rawText || "").toLowerCase();
            for (const code of analysis.countries) {
                if (code === "DE" || code === data.destinationCountry) continue;
                // Check if mentioned near "transit", "via", "Umschlag", "Durchfuhr"
                const cName = (COUNTRIES[code]?.de || "").toLowerCase();
                const transitRegex = new RegExp(`(?:transit|via|umschlag|durchfuhr|zwischenstopp|routing)[^.]{0,60}(?:${cName}|${code})`, "i");
                const transitRegex2 = new RegExp(`(?:${cName}|${code})[^.]{0,60}(?:transit|via|umschlag|durchfuhr|zwischenstopp)`, "i");
                if (transitRegex.test(rawLower) || transitRegex2.test(rawLower) ||
                    rawLower.includes(`transitland: ${cName}`) || rawLower.includes(`transit: ${cName}`)) {
                    transitCountries.push(code);
                }
            }
            if (transitCountries.length > 0) {
                data.transitCountries = transitCountries;
            }

            // Set product description from extracted terms
            if (analysis.products.length > 0) {
                data.productDescription = analysis.products.join(", ");
            }

            // Set value (handle European format: 485.000,00 → 485000.00)
            if (analysis.values.length > 0) {
                let numStr = analysis.values[0].replace(/[^\d.,]/g, "");
                // Detect European format: dots as thousands, comma as decimal
                if (numStr.includes(",") && numStr.includes(".") && numStr.lastIndexOf(",") > numStr.lastIndexOf(".")) {
                    numStr = numStr.replace(/\./g, "").replace(",", ".");
                } else if (numStr.includes(",") && !numStr.includes(".")) {
                    // Could be 485,00 (decimal) or 485,000 (thousands)
                    const parts = numStr.split(",");
                    if (parts[1] && parts[1].length === 3) numStr = numStr.replace(",", ""); // thousands
                    else numStr = numStr.replace(",", "."); // decimal
                }
                const num = parseFloat(numStr);
                if (!isNaN(num)) data.valueEur = num;
            }

            // Set date
            if (analysis.dates.length > 0) {
                data.plannedDeliveryDate = analysis.dates[0];
            }

            // Set end use from hints
            if (analysis.endUseHints.length > 0) {
                data.endUseDescription = analysis.endUseHints.map(h => h.keyword).join(", ");
            }

            // Guess product type from keywords
            if (analysis.products.some(p => /software|programm|code/i.test(p))) {
                data.productType = "software";
            } else if (analysis.products.some(p => /technologie|technology|patent|lizenz|license/i.test(p))) {
                data.productType = "technologie";
            } else if (analysis.products.length > 0) {
                data.productType = "ware";
            }

            return data;
        },
    };

        const ref = useRef(null);

            if (ref.current && window.lucide) {
                ref.current.innerHTML = "";
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("width", size);
                svg.setAttribute("height", size);
                svg.setAttribute("viewBox", "0 0 24 24");
                svg.setAttribute("fill", "none");
                svg.setAttribute("stroke", "currentColor");
                svg.setAttribute("stroke-width", "2");
                svg.setAttribute("stroke-linecap", "round");
                svg.setAttribute("stroke-linejoin", "round");
                if (className) svg.setAttribute("class", className);
                ref.current.appendChild(svg);
                try { lucide.createIcons({ nodes: [svg], nameAttr: "data-lucide", attrs: { "data-lucide": name } }); } catch(e) {}
                // Fallback: direct icon render
                if (svg.childNodes.length === 0) {
                    svg.setAttribute("data-lucide", name);
                    try { lucide.createIcons(); } catch(e) {}
                }
            }
        }, [name, size, className]);
        return React.createElement("span", { ref, className: "inline-flex items-center " + className });

    // ABSCHNITT 4b: CHATBOT UI
