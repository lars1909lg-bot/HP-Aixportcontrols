    function formatDate(isoString) {
        if (!isoString) return "—";
        const d = new Date(isoString);
        return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })
            + " " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    }

    function formatDateShort(isoString) {
        if (!isoString) return "—";
        return new Date(isoString).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3b: SCREENING SERVICE (Fuzzy Matching)
    // ══════════════════════════════════════════════════════════════════

    const ScreeningService = {
        // Levenshtein distance for fuzzy matching
        _levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1, dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0));
            return dp[m][n];
        },

        // Calculate similarity score (0.0–1.0)
        _similarity(query, target) {
            const q = query.toLowerCase().trim();
            const t = target.toLowerCase().trim();
            if (q === t) return 1.0;
            if (t.includes(q) || q.includes(t)) return 0.9;
            const maxLen = Math.max(q.length, t.length);
            if (maxLen === 0) return 0;
            const dist = this._levenshtein(q, t);
            return Math.max(0, 1 - dist / maxLen);
        },

        // Screen a single name against all sanctions demo data
        screenEntity(entityName, entityCountry) {
            const results = [];
            const threshold = 0.80; // 80% Projektanforderung

            for (const entry of SANCTIONS_DEMO_DATA) {
                // Check main name
                let bestScore = this._similarity(entityName, entry.name);
                let matchedName = entry.name;
                let matchType = bestScore === 1.0 ? "exact" : "fuzzy";

                // Check aliases
                for (const alias of (entry.aliases || [])) {
                    const aliasScore = this._similarity(entityName, alias);
                    if (aliasScore > bestScore) {
                        bestScore = aliasScore;
                        matchedName = alias;
                        matchType = aliasScore === 1.0 ? "exact" : "alias";
                    }
                }

                // Country boost: if countries match, boost score slightly
                if (entityCountry && entry.country === entityCountry && bestScore > 0.6) {
                    bestScore = Math.min(1.0, bestScore + 0.05);
                }

                if (bestScore >= threshold) {
                    results.push({
                        sanctionEntry: entry,
                        matchScore: Math.round(bestScore * 100) / 100,
                        matchedName,
                        matchType,
                    });
                }
            }

            return results.sort((a, b) => b.matchScore - a.matchScore);
        },

        // Screen all parties in a case
        screenCase(caseData) {
            const allResults = [];
            for (const party of (caseData.parties || [])) {
                if (!party.name.trim()) continue;
                const matches = this.screenEntity(party.name, party.country);
                allResults.push({
                    partyName: party.name,
                    partyCountry: party.country,
                    partyRole: party.role,
                    matches,
                    hasMatch: matches.length > 0,
                });
            }
            return allResults;
        },
    };

    // Embargo check service
    const EmbargoService = {
        checkCountry(countryCode) {
            const embargo = EMBARGO_COUNTRIES[countryCode];
            if (!embargo) {
                return { isRestricted: false, resultStatus: "unauffaellig" };
            }
            return {
                isRestricted: true,
                restrictionType: embargo.restrictionType,
                label_de: embargo.label_de,
                label_en: embargo.label_en,
                regulations: embargo.regulations,
                resultStatus: embargo.restrictionType === "full_embargo" ? "kritisch" : "pruefpflichtig",
            };
        },

        checkCase(caseData) {
            const results = [];
            const countries = [
                { code: caseData.destinationCountry, role: "destination" },
                { code: caseData.dispatchCountry, role: "dispatch" },
                ...(caseData.transitCountries || []).map(c => ({ code: c, role: "transit" })),
            ];
            for (const { code, role } of countries) {
                if (!code) continue;
                const check = this.checkCountry(code);
                results.push({ countryCode: code, countryRole: role, ...check });
            }
            return results;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3c: PII-GATE (Pflicht vor jedem LLM-Call)
    // ══════════════════════════════════════════════════════════════════

    const PIIGate = {
        ALLOWED_FIELDS: [
            "product_type", "product_description", "product_category",
            "destination_country", "dispatch_country", "end_use_description",
            "quantity", "value_eur",
        ],

        BLOCKED_PATTERNS: [
            /[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g,               // Email
            /\b\d{2,4}[-\/]\d{2,4}[-\/]\d{2,4}\b/g,                            // Dates (DOB)
            /\+?\d{1,3}[-.\s]?\(?\d{1,4}\)?[-.\s]?\d{3,}[-.\s]?\d{2,}/g,     // Phone
            /\b[A-Z]{2}\d{6,9}\b/g,                                            // Passport-like
            /\b\d{3}[-.]?\d{2}[-.]?\d{4}\b/g,                                  // SSN-like
            /\bDE\d{9}\b/g,                                                     // German VAT
        ],

        filterPayload(caseData) {
            const filtered = {};
            for (const field of this.ALLOWED_FIELDS) {
                const camelField = field.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
                if (caseData[camelField] !== undefined) {
                    filtered[field] = caseData[camelField];
                }
            }
            return filtered;
        },

        scanForPii(payload) {
            const text = JSON.stringify(payload);
            for (const pattern of this.BLOCKED_PATTERNS) {
                pattern.lastIndex = 0;
                if (pattern.test(text)) return true;
            }
            return false;
        },

        gate(caseData) {
            const filtered = this.filterPayload(caseData);
            const hasPii = this.scanForPii(filtered);
            return { filtered, blocked: hasPii };
        }
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3d: LLM-SERVICE (Multi-Model, Browser-seitig)
    // ══════════════════════════════════════════════════════════════════

    const LLMService = {
        MODEL_ROUTING: {
            classification: "claude",
            screening_eval: "openai",
            regulation_check: "claude",
            enduse_assessment: "claude",
            decision_reasoning: "claude",
            case_file_text: "claude",
            data_extraction: "openai",
        },

        async call(agentType, payload, config, caseId, userId) {
            // 1. PII Gate
            const { filtered, blocked } = PIIGate.gate(payload);
            if (blocked) {
                return { success: false, error: "PII detected — request blocked", blocked: true };
            }

            const model = this.MODEL_ROUTING[agentType] || "claude";

            // 2. Check API key availability
            if (model === "claude" && !config.anthropicApiKey) {
                return { success: false, error: "No Anthropic API key configured", noKey: true };
            }
            if (model === "openai" && !config.openaiApiKey) {
                return { success: false, error: "No OpenAI API key configured", noKey: true };
            }

            // 3. Make API call
            try {
                if (model === "claude") {
                    return await this._callClaude(agentType, filtered, config.anthropicApiKey);
                } else {
                    return await this._callOpenAI(agentType, filtered, config.openaiApiKey);
                }
            } catch (err) {
                return { success: false, error: err.message };
            }
        },

        async _callClaude(agentType, payload, apiKey) {
            const systemPrompts = {
                classification: `You are an export control classification assistant. Analyze the product description and suggest applicable Dual-Use categories (EU VO 2021/821 Annex I, categories 0-9), German Export List (AL) numbers, and HS codes. Respond ONLY in JSON format: {"dualUseNumber": "string or empty", "alNumber": "string or empty", "hsCode": "string or empty", "confidence": 0.0-1.0, "reasoning": "string", "isDualUse": boolean}`,
                enduse_assessment: `You are an export control end-use assessment assistant. Analyze the provided end-use information and red flag responses to assess risk. Respond ONLY in JSON format: {"riskLevel": "low|medium|high|critical", "reasoning": "string", "catchAllRelevant": boolean, "recommendations": ["string"]}`,
            };

            const resp = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": apiKey,
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true",
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-6-20250514",
                    max_tokens: 1024,
                    system: systemPrompts[agentType] || "You are an export control assistant. Respond in JSON.",
                    messages: [{ role: "user", content: JSON.stringify(payload) }],
                }),
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`Claude API error ${resp.status}: ${errText.substring(0, 200)}`);
            }

            const data = await resp.json();
            const text = data.content?.[0]?.text || "";
            try {
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                return { success: true, data: JSON.parse(jsonMatch?.[0] || "{}"), raw: text, model: "claude" };
            } catch {
                return { success: true, data: {}, raw: text, model: "claude" };
            }
        },

        async _callOpenAI(agentType, payload, apiKey) {
            const resp = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    response_format: { type: "json_object" },
                    messages: [
                        { role: "system", content: "You are an export control assistant. Respond in JSON." },
                        { role: "user", content: JSON.stringify(payload) },
                    ],
                }),
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`OpenAI API error ${resp.status}: ${errText.substring(0, 200)}`);
            }

            const data = await resp.json();
            const text = data.choices?.[0]?.message?.content || "{}";
            try {
                return { success: true, data: JSON.parse(text), raw: text, model: "openai" };
            } catch {
                return { success: true, data: {}, raw: text, model: "openai" };
            }
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3e: KLASSIFIZIERUNGS-SERVICE (Säule 3, Demo + KI)
    // ══════════════════════════════════════════════════════════════════

    const ClassificationService = {
        // Demo-basierte Keyword-Klassifizierung (funktioniert ohne API-Key)
        classifyByKeywords(productDescription, productType) {
            const desc = (productDescription || "").toLowerCase();
            const matches = [];

            for (const [cat, info] of Object.entries(DUAL_USE_CATEGORIES)) {
                const matchedKeywords = info.keywords.filter(kw => desc.includes(kw.toLowerCase()));
                if (matchedKeywords.length > 0) {
                    matches.push({
                        category: cat,
                        label_de: info.de,
                        label_en: info.en,
                        matchedKeywords,
                        score: Math.min(0.95, 0.6 + matchedKeywords.length * 0.1),
                    });
                }
            }

            matches.sort((a, b) => b.score - a.score);

            if (matches.length === 0) {
                return {
                    isDualUse: false,
                    dualUseNumber: "",
                    alNumber: "",
                    hsCode: "",
                    confidence: 0.85,
                    reasoning_de: "Keine Dual-Use-relevanten Schlüsselwörter in der Produktbeschreibung erkannt.",
                    reasoning_en: "No Dual-Use-relevant keywords detected in product description.",
                    categories: [],
                };
            }

            const top = matches[0];
            return {
                isDualUse: true,
                dualUseNumber: `${top.category}A001`,
                alNumber: "",
                hsCode: "",
                confidence: top.score,
                reasoning_de: `Schlüsselwörter [${top.matchedKeywords.join(", ")}] deuten auf ${top.label_de} hin.`,
                reasoning_en: `Keywords [${top.matchedKeywords.join(", ")}] suggest ${top.label_en}.`,
                categories: matches,
            };
        },

        // KI-basierte Klassifizierung (braucht API-Key)
        async classifyWithAI(caseData, config) {
            const result = await LLMService.call("classification", caseData, config);
            if (!result.success) return null;
            return result.data;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3f: ENDVERWENDUNGS-SERVICE (Säule 4)
    // ══════════════════════════════════════════════════════════════════

    const EndUseService = {
        evaluateResponses(responses) {
            const redFlags = [];
            let catchAllRelevant = false;

            for (const resp of responses) {
                const question = RED_FLAG_CATALOG.find(q => q.id === resp.questionId);
                if (!question) continue;

                if (resp.answer === "yes" || (resp.answer === "unknown" && question.critical)) {
                    redFlags.push({
                        questionId: resp.questionId,
                        question_de: question.de,
                        question_en: question.en,
                        answer: resp.answer,
                        critical: question.critical,
                        category: question.category,
                    });
                }

                // Catch-All triggers
                if (resp.answer === "yes" && ["enduse", "enduser", "route"].includes(question.category) && question.critical) {
                    catchAllRelevant = true;
                }
            }

            let resultStatus = "unauffaellig";
            if (redFlags.length > 0) {
                resultStatus = redFlags.some(rf => rf.critical && rf.answer === "yes") ? "kritisch" : "pruefpflichtig";
            }

            return { redFlags, catchAllRelevant, resultStatus };
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3g: DECISION-AGENT (Konsolidierte Bewertung)
    // ══════════════════════════════════════════════════════════════════

    const DecisionAgent = {
        // Evaluate pillar status: returns { status, label }
        _pillarStatus(results, type) {
            if (!results || results.length === 0) return { status: "pending", label: "—" };
            if (type === "screening") {
                const hasMatch = results.some(r => r.matchScore >= 0.80 && r.trefferDecision !== "cleared");
                const hasUnresolved = results.some(r => r.matchScore >= 0.80 && !r.trefferDecision);
                if (hasUnresolved) return { status: "pending", label: "pending" };
                if (hasMatch) return { status: "kritisch", label: "kritisch" };
                return { status: "unauffaellig", label: "unauffaellig" };
            }
            if (type === "embargo") {
                const worst = results.reduce((w, r) => {
                    if (r.resultStatus === "kritisch") return "kritisch";
                    if (r.resultStatus === "pruefpflichtig" && w !== "kritisch") return "pruefpflichtig";
                    return w;
                }, "unauffaellig");
                return { status: worst, label: worst };
            }
            if (type === "classification") {
                const r = results[0];
                if (!r) return { status: "pending", label: "—" };
                if (r.userAcceptedKi === null) return { status: "pending", label: "pending" };
                if (r.userDecisionDualUse) return { status: "pruefpflichtig", label: "pruefpflichtig" };
                return { status: "unauffaellig", label: "unauffaellig" };
            }
            if (type === "enduse") {
                const r = results[0];
                if (!r) return { status: "pending", label: "—" };
                return { status: r.resultStatus, label: r.resultStatus };
            }
            return { status: "pending", label: "—" };
        },

        // Consolidated risk assessment
        assess(screeningResults, embargoResults, classificationResults, endUseResults, language) {
            const pillars = {
                screening: this._pillarStatus(screeningResults, "screening"),
                embargo: this._pillarStatus(embargoResults, "embargo"),
                classification: this._pillarStatus(classificationResults, "classification"),
                enduse: this._pillarStatus(endUseResults, "enduse"),
            };

            // Check if all pillars are resolved
            const allResolved = Object.values(pillars).every(p => p.status !== "pending");

            // Calculate overall risk
            const statusPriority = { kritisch: 4, pruefpflichtig: 3, unauffaellig: 1, pending: 0 };
            const maxStatus = Object.values(pillars).reduce((max, p) =>
                (statusPriority[p.status] || 0) > (statusPriority[max] || 0) ? p.status : max, "unauffaellig");

            let riskLevel = "low";
            if (maxStatus === "kritisch") riskLevel = "critical";
            else if (maxStatus === "pruefpflichtig") riskLevel = "medium";

            // Check for blocked (any unresolved escalated screening match)
            const hasEscalated = (screeningResults || []).some(r => r.trefferDecision === "escalated");
            if (hasEscalated) riskLevel = "high";

            // Check for blocked (full embargo)
            const hasFullEmbargo = (embargoResults || []).some(r => r.restrictionType === "full_embargo");
            if (hasFullEmbargo) riskLevel = "blocked";

            // Generate reasoning
            const reasons = [];
            if (language === "de") {
                if (pillars.screening.status === "kritisch") reasons.push("Sanktionslistentreffer nicht freigegeben");
                if (pillars.screening.status === "unauffaellig") reasons.push("Keine Sanktionslistentreffer");
                if (pillars.embargo.status === "kritisch") reasons.push("Embargo-Restriktionen erkannt");
                if (pillars.embargo.status === "pruefpflichtig") reasons.push("Teilembargo — sektorale Prüfung erforderlich");
                if (pillars.embargo.status === "unauffaellig") reasons.push("Keine Länderbeschränkungen");
                if (pillars.classification.status === "pruefpflichtig") reasons.push("Dual-Use-Relevanz identifiziert — Genehmigungsprüfung empfohlen");
                if (pillars.classification.status === "unauffaellig") reasons.push("Keine Dual-Use-Relevanz");
                if (pillars.enduse.status === "kritisch") reasons.push("Kritische Red Flags bei Endverwendung — Catch-All prüfen");
                if (pillars.enduse.status === "pruefpflichtig") reasons.push("Red Flags bei Endverwendung erkannt");
                if (pillars.enduse.status === "unauffaellig") reasons.push("Keine Endverwendungsrisiken erkannt");
            } else {
                if (pillars.screening.status === "kritisch") reasons.push("Sanctions list match not cleared");
                if (pillars.screening.status === "unauffaellig") reasons.push("No sanctions list matches");
                if (pillars.embargo.status === "kritisch") reasons.push("Embargo restrictions detected");
                if (pillars.embargo.status === "pruefpflichtig") reasons.push("Partial embargo — sectoral review required");
                if (pillars.embargo.status === "unauffaellig") reasons.push("No country restrictions");
                if (pillars.classification.status === "pruefpflichtig") reasons.push("Dual-Use relevance identified — license review recommended");
                if (pillars.classification.status === "unauffaellig") reasons.push("No Dual-Use relevance");
                if (pillars.enduse.status === "kritisch") reasons.push("Critical Red Flags in end use — check Catch-All");
                if (pillars.enduse.status === "pruefpflichtig") reasons.push("Red Flags in end use detected");
                if (pillars.enduse.status === "unauffaellig") reasons.push("No end use risks detected");
            }

            return {
                pillars,
                allResolved,
                riskLevel,
                reasoning: reasons.join(". ") + ".",
                overallAssessment: reasons.join("; "),
            };
        },
    };

    // Re-Check Rule: > 5 business days
    const ReCheckRule = {
        isRecheckRequired(plannedDeliveryDate) {
            if (!plannedDeliveryDate) return false;
            const delivery = new Date(plannedDeliveryDate);
            const now = new Date();
            let businessDays = 0;
            const current = new Date(now);
            while (current < delivery) {
                current.setDate(current.getDate() + 1);
                const day = current.getDay();
                if (day !== 0 && day !== 6) businessDays++;
                if (businessDays > 5) return true;
            }
            return false;
        },
    };

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 3h: PDF-GENERATOR (Case File)
    // ══════════════════════════════════════════════════════════════════

    const PDFGenerator = {
        // Simple SHA-256 via SubtleCrypto
        async _sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
        },

        async generate(caseData, screeningResults, embargoResults, classificationResults,
                        endUseResults, auditEntries, assessment, users, t, language, countries) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const margin = 15;
            const contentW = pageW - margin * 2;
            let y = margin;

            const addFooter = () => {
                const pageCount = doc.getNumberOfPages();
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setTextColor(150);
                    doc.text(`${t("pdf_page")} ${i} / ${pageCount}`, pageW - margin, pageH - 8, { align: "right" });
                    doc.text(t("pdf_disclaimer"), margin, pageH - 8);
                }
            };

            const checkPage = (needed = 20) => {
                if (y + needed > pageH - 20) { doc.addPage(); y = margin; }
            };

            const sectionTitle = (text) => {
                checkPage(15);
                y += 4;
                doc.setFontSize(11);
                doc.setTextColor(30, 64, 175);
                doc.setFont(undefined, "bold");
                doc.text(text, margin, y);
                y += 2;
                doc.setDrawColor(30, 64, 175);
                doc.line(margin, y, pageW - margin, y);
                y += 6;
                doc.setTextColor(0);
                doc.setFont(undefined, "normal");
                doc.setFontSize(9);
            };

            const addField = (label, value) => {
                checkPage(8);
                doc.setFont(undefined, "bold");
                doc.text(label + ":", margin, y);
                doc.setFont(undefined, "normal");
                const labelW = doc.getTextWidth(label + ": ");
                const lines = doc.splitTextToSize(String(value || "—"), contentW - labelW);
                doc.text(lines, margin + labelW, y);
                y += lines.length * 4.5;
            };

            const tCountry = (code) => countries[code]?.[language] || code;

            // ── Header ──
            doc.setFontSize(16);
            doc.setTextColor(30, 64, 175);
            doc.setFont(undefined, "bold");
            doc.text("AIxportControls", margin, y);
            y += 6;
            doc.setFontSize(12);
            doc.setTextColor(60);
            doc.text(t("pdf_title"), margin, y);
            y += 8;
            doc.setFontSize(9);
            doc.setTextColor(0);
            doc.setFont(undefined, "normal");
            addField(t("pdf_case_number"), caseData.caseNumber);
            addField("Status", caseData.status);
            addField(t("pdf_generated_at"), new Date().toLocaleString(language === "de" ? "de-DE" : "en-GB"));
            y += 2;

            // ── 1. Parties ──
            sectionTitle(t("pdf_section_parties"));
            if (caseData.parties.length > 0) {
                const partyRows = caseData.parties.map(p => [
                    p.name, p.role, tCountry(p.country), p.address || "—"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [[language === "de" ? "Name" : "Name", language === "de" ? "Rolle" : "Role",
                            language === "de" ? "Land" : "Country", language === "de" ? "Adresse" : "Address"]],
                    body: partyRows,
                    styles: { fontSize: 8, cellPadding: 2 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text("—", margin, y); y += 5;
            }

            // ── 2. Countries ──
            sectionTitle(t("pdf_section_countries"));
            addField(language === "de" ? "Versandland" : "Dispatch Country", tCountry(caseData.dispatchCountry));
            addField(language === "de" ? "Bestimmungsland" : "Destination Country", tCountry(caseData.destinationCountry));
            if (caseData.transitCountries.length > 0) {
                addField(language === "de" ? "Transitländer" : "Transit Countries",
                    caseData.transitCountries.map(c => tCountry(c)).join(", "));
            }

            // ── 3. Product ──
            sectionTitle(t("pdf_section_product"));
            addField(language === "de" ? "Produkttyp" : "Product Type", caseData.productType);
            addField(language === "de" ? "Beschreibung" : "Description", caseData.productDescription);
            if (caseData.endUseDescription) {
                addField(language === "de" ? "Endverwendung" : "End Use", caseData.endUseDescription);
            }
            if (caseData.valueEur) {
                addField(language === "de" ? "Warenwert" : "Value", `€ ${Number(caseData.valueEur).toLocaleString("de-DE", { minimumFractionDigits: 2 })}`);
            }

            // ── 4. Screening (Pillar 1) ──
            sectionTitle(t("pdf_section_screening"));
            if (screeningResults.length > 0) {
                const sRows = screeningResults.map(r => [
                    r.entityName, r.listSource, `${Math.round(r.matchScore * 100)}%`,
                    r.matchedEntry || "—", r.trefferDecision || "pending"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [["Entity", language === "de" ? "Liste" : "List", "Score",
                            language === "de" ? "Treffer" : "Match", "Decision"]],
                    body: sRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 5. Embargo (Pillar 2) ──
            sectionTitle(t("pdf_section_embargo"));
            if (embargoResults.length > 0) {
                const eRows = embargoResults.map(r => [
                    r.countryName, r.countryRole, r.restrictionType || "none",
                    r.resultStatus, r.applicableRegulations || "—"
                ]);
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [[language === "de" ? "Land" : "Country", language === "de" ? "Rolle" : "Role",
                            language === "de" ? "Restriktion" : "Restriction", "Status",
                            language === "de" ? "Verordnungen" : "Regulations"]],
                    body: eRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 6. Classification (Pillar 3) ──
            sectionTitle(t("pdf_section_classification"));
            if (classificationResults.length > 0) {
                const cl = classificationResults[0];
                addField("Dual-Use Nr.", cl.kiSuggestionDualUse || "—");
                addField("AL-Nr.", cl.kiSuggestionAl || "—");
                addField("HS-Code", cl.kiSuggestionHsCode || "—");
                addField(language === "de" ? "KI-Konfidenz" : "AI Confidence", `${Math.round((cl.kiConfidence || 0) * 100)}%`);
                addField(language === "de" ? "KI-Begründung" : "AI Reasoning", cl.kiReasoning || "—");
                if (cl.userAcceptedKi !== null) {
                    addField(language === "de" ? "Nutzer-Entscheidung" : "User Decision",
                        cl.userAcceptedKi ? (language === "de" ? "KI-Vorschlag übernommen" : "AI suggestion accepted") :
                        (language === "de" ? "Manuell geändert" : "Manually modified"));
                    if (cl.userDecisionDualUse) addField("User Dual-Use", cl.userDecisionDualUse);
                }
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 7. End Use (Pillar 4) ──
            sectionTitle(t("pdf_section_enduse"));
            if (endUseResults.length > 0) {
                const eu = endUseResults[0];
                addField("Status", eu.resultStatus);
                addField("Catch-All", eu.catchAllRelevant
                    ? (language === "de" ? "Relevant" : "Relevant")
                    : (language === "de" ? "Nicht relevant" : "Not relevant"));
                if (eu.redFlagsDetected.length > 0) {
                    addField("Red Flags", eu.redFlagsDetected.length.toString());
                    eu.redFlagsDetected.forEach((rf, i) => {
                        checkPage(8);
                        doc.text(`  ${i + 1}. ${language === "de" ? rf.question_de : rf.question_en} [${rf.answer}]${rf.critical ? " ⚠" : ""}`,
                            margin + 2, y);
                        y += 4;
                    });
                }
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 8. Consolidated Assessment ──
            sectionTitle(t("pdf_section_assessment"));
            if (assessment || caseData.consolidatedAssessment) {
                const riskLevel = assessment?.riskLevel || caseData.riskLevel || "—";
                const reasoning = assessment?.reasoning || caseData.consolidatedReasoning || "—";
                addField(language === "de" ? "Risikostufe" : "Risk Level", riskLevel.toUpperCase());
                addField(language === "de" ? "Begründung" : "Reasoning", reasoning);
            } else {
                doc.text(t("pdf_no_results"), margin, y); y += 5;
            }

            // ── 9. Approval ──
            sectionTitle(t("pdf_section_approval"));
            if (caseData.approvedBy) {
                const approver = users.find(u => u.id === caseData.approvedBy);
                addField(language === "de" ? "Status" : "Status", caseData.status);
                addField(language === "de" ? "Entscheider" : "Decided by", approver?.fullName || "—");
                if (caseData.approvalRationale) addField(language === "de" ? "Begründung" : "Rationale", caseData.approvalRationale);
                if (caseData.rejectionRationale) addField(language === "de" ? "Ablehnungsgrund" : "Rejection reason", caseData.rejectionRationale);
            } else {
                doc.text(language === "de" ? "Noch nicht entschieden" : "Not yet decided", margin, y); y += 5;
            }

            // ── 10. Audit Trail ──
            sectionTitle(t("pdf_section_audit"));
            if (auditEntries.length > 0) {
                const aRows = auditEntries.map(e => {
                    const user = users.find(u => u.id === e.userId);
                    return [
                        new Date(e.timestamp).toLocaleString(language === "de" ? "de-DE" : "en-GB"),
                        user?.fullName || "System",
                        t("audit_action_" + e.action),
                    ];
                });
                doc.autoTable({
                    startY: y, margin: { left: margin, right: margin },
                    head: [["Timestamp", language === "de" ? "Benutzer" : "User", "Action"]],
                    body: aRows,
                    styles: { fontSize: 7, cellPadding: 1.5 },
                    headStyles: { fillColor: [30, 64, 175], textColor: 255 },
                });
                y = doc.lastAutoTable.finalY + 4;
            }

            // ── Footer + Hash ──
            addFooter();

            // Compute SHA-256 of PDF content
            const pdfBytes = doc.output("arraybuffer");
            const hashHex = await this._sha256(new TextDecoder("latin1").decode(new Uint8Array(pdfBytes)));

            // Add hash on last page
            const lastPage = doc.getNumberOfPages();
            doc.setPage(lastPage);
            checkPage(15);
            y += 4;
            doc.setFontSize(7);
            doc.setTextColor(100);
            doc.text(`${t("pdf_hash_label")}: ${hashHex}`, margin, pageH - 15);

            // Save
            doc.save(`${caseData.caseNumber}_CaseFile_${language.toUpperCase()}.pdf`);
            return hashHex;
        },
    };

    // ══════════════════════════════════════════════════════════════════

    const CSVService = {
        getTemplate() {
            return "productDescription;productType;destinationCountry;dispatchCountry;endUseDescription;partyName;partyRole;partyCountry;valueEur;plannedDeliveryDate\n" +
                   '"Industrial Valve";"dual_use_good";"RU";"DE";"Oil refinery";"Acme Corp";"buyer";"RU";"50000";"2026-06-01"';
        },

        parse(csvText) {
            const lines = csvText.trim().split("\n");
            if (lines.length < 2) throw new Error("CSV must have header + at least one row");

            const header = lines[0].split(";").map(h => h.replace(/"/g, "").trim());
            const required = ["productDescription", "destinationCountry"];
            for (const r of required) {
                if (!header.includes(r)) throw new Error(`Missing required column: ${r}`);
            }

            const cases = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = lines[i].split(";").map(v => v.replace(/^"|"$/g, "").trim());
                const row = {};
                header.forEach((h, idx) => { row[h] = vals[idx] || ""; });

                cases.push({
                    productDescription: row.productDescription || "",
                    productType: row.productType || "other",
                    destinationCountry: row.destinationCountry || "",
                    dispatchCountry: row.dispatchCountry || "DE",
                    transitCountries: row.transitCountries ? row.transitCountries.split(",").map(s => s.trim()) : [],
                    endUseDescription: row.endUseDescription || "",
                    valueEur: row.valueEur ? parseFloat(row.valueEur) : null,
                    plannedDeliveryDate: row.plannedDeliveryDate || "",
                    parties: row.partyName ? [{
                        name: row.partyName,
                        role: row.partyRole || "buyer",
                        country: row.partyCountry || row.destinationCountry,
                        address: row.partyAddress || "",
                    }] : [],
                });
            }
            return cases;
        },

        downloadTemplate() {
            const blob = new Blob([this.getTemplate()], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "AIxportControls_Import_Template.csv";
            a.click();
            URL.revokeObjectURL(url);
        },
    };

        const fileInputRef = useRef(null);

        const handleCsvFile = (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = CSVService.parse(e.target.result);
                    let imported = 0;
                    for (const row of parsed) {
                        createCase({ ...row, createdBy: currentUser.id });
                        imported++;
                    }
                    addAuditEntry({
                        action: "case_exported",
                        userId: currentUser.id,
                        details: { type: "csv_import", count: imported },
                    });
                    setCsvMessage({ type: "success", text: `${imported} ${t("csv_import_success")}` });
                    setShowCsvImport(false);
                } catch (err) {
                    setCsvMessage({ type: "error", text: `${t("csv_import_error")}: ${err.message}` });
                }
                setTimeout(() => setCsvMessage(null), 4000);
            };
            reader.readAsText(file);

            if (statusFilter !== "all" && c.status !== statusFilter) return false;

    // --- Decision Panel (Konsolidierte Bewertung) ---
    function DecisionPanel({ caseId, onAssessmentGenerated }) {
        const { t, language } = useI18n();
        const { getScreeningResultsForCase, getEmbargoResultsForCase,
                getClassificationResultsForCase, getEndUseResultsForCase } = useData();

        const screeningResults = getScreeningResultsForCase(caseId);
        const embargoResults = getEmbargoResultsForCase(caseId);
        const classificationResults = getClassificationResultsForCase(caseId);
        const endUseResults = getEndUseResultsForCase(caseId);

        const [assessment, setAssessment] = useState(null);

        const hasAllPillars = screeningResults.length > 0 && embargoResults.length > 0 &&
            classificationResults.length > 0 && endUseResults.length > 0;

        const handleGenerate = () => {
            const result = DecisionAgent.assess(
                screeningResults, embargoResults, classificationResults, endUseResults, language);
            setAssessment(result);
            if (onAssessmentGenerated) onAssessmentGenerated(result);
        };

        const pillarStatusColor = (status) =>
            status === "kritisch" ? "bg-red-100 text-red-700 border-red-200" :
            status === "pruefpflichtig" ? "bg-amber-100 text-amber-700 border-amber-200" :
            status === "unauffaellig" ? "bg-green-100 text-green-700 border-green-200" :
            "bg-gray-100 text-gray-500 border-gray-200";

        const riskLevelColor = (level) =>
            level === "blocked" ? "bg-red-600 text-white" :
            level === "critical" ? "bg-red-500 text-white" :
            level === "high" ? "bg-orange-500 text-white" :
            level === "medium" ? "bg-amber-400 text-amber-900" :
            "bg-green-500 text-white";

        const riskLevelLabel = (level) => {
            const labels = {
                de: { blocked: "BLOCKIERT", critical: "KRITISCH", high: "HOCH", medium: "MITTEL", low: "NIEDRIG" },
                en: { blocked: "BLOCKED", critical: "CRITICAL", high: "HIGH", medium: "MEDIUM", low: "LOW" },
            };
            return (labels[language] || labels.en)[level] || level;
        };

        const pillarLabels = [
            { key: "screening", label: t("decision_pillar_1"), icon: "shield" },
            { key: "embargo", label: t("decision_pillar_2"), icon: "globe" },
            { key: "classification", label: t("decision_pillar_3"), icon: "box" },
            { key: "enduse", label: t("decision_pillar_4"), icon: "target" },
        ];

        return React.createElement("div", { className: "bg-white rounded-xl border p-5" },
            React.createElement("h3", { className: "font-semibold text-gray-700 mb-3 flex items-center gap-2" },
                React.createElement(SvgIcon, { type: "check-circle", size: 18 }),
                t("decision_title"),
                React.createElement(KIBadge),
            ),

            !hasAllPillars
                ? React.createElement("div", { className: "text-sm text-gray-400 italic p-3 bg-gray-50 rounded-lg" },
                    t("decision_not_ready"))
                : !assessment
                    ? React.createElement("button", {
                        className: "px-4 py-2 bg-axc-primary text-white rounded-lg text-sm font-medium hover:bg-axc-primary-dark transition flex items-center gap-2",
                        onClick: handleGenerate,
                    },
                        React.createElement(SvgIcon, { type: "check-circle", size: 16 }),
                        t("decision_generate"),
                    )
                    : React.createElement("div", { className: "space-y-4" },
                        // Risk Level Badge
                        React.createElement("div", { className: "flex items-center gap-3" },
                            React.createElement("span", { className: "text-sm text-gray-500" }, t("decision_risk_level") + ":"),
                            React.createElement("span", {
                                className: `px-3 py-1 rounded-full text-xs font-bold ${riskLevelColor(assessment.riskLevel)}`,
                            }, riskLevelLabel(assessment.riskLevel)),
                            assessment.allResolved
                                ? React.createElement("span", { className: "text-xs text-green-600 flex items-center gap-1" },
                                    React.createElement(SvgIcon, { type: "check-circle", size: 12 }),
                                    t("decision_generated"))
                                : React.createElement("span", { className: "text-xs text-amber-600" }, "…"),
                        ),

                        // Pillar Grid
                        React.createElement("div", { className: "grid grid-cols-2 gap-2" },
                            pillarLabels.map(pl =>
                                React.createElement("div", {
                                    key: pl.key,
                                    className: `flex items-center gap-2 p-2.5 rounded-lg border text-xs ${pillarStatusColor(assessment.pillars[pl.key]?.status)}`,
                                },
                                    React.createElement(SvgIcon, { type: pl.icon, size: 14 }),
                                    React.createElement("div", null,
                                        React.createElement("div", { className: "font-medium" }, pl.label),
                                        React.createElement("div", { className: "opacity-70 capitalize" },
                                            assessment.pillars[pl.key]?.label || "—"),
                                    ),
                                ),
                            ),
                        ),

                        // Reasoning
                        React.createElement("div", { className: "bg-gray-50 rounded-lg p-3 text-xs text-gray-600" },
                            React.createElement("div", { className: "font-medium text-gray-700 mb-1" }, t("decision_reasoning")),

    // --- Case Detail View ---
    function CaseDetailView({ caseId, setCurrentPage }) {
        const { t, tCountry, language } = useI18n();
        const { currentUser } = useAuth();
        const { db, transitionCaseStatus, getAuditLogForCase, getUserById,
                addScreeningResult, addEmbargoResult, getScreeningResultsForCase,
                getEmbargoResultsForCase, isSourceStale, addAuditEntry, updateCase,
                addClassificationResult, getClassificationResultsForCase,
                getEndUseResultsForCase } = useData();

        const caseData = db.cases.find(c => c.id === caseId);
        const auditEntries = getAuditLogForCase(caseId);
        const creator = getUserById(caseData?.createdBy);
        const approver = getUserById(caseData?.approvedBy);
        const screeningResults = getScreeningResultsForCase(caseId);
        const embargoResults = getEmbargoResultsForCase(caseId);
        const classificationResults = getClassificationResultsForCase(caseId);
        const endUseResults = getEndUseResultsForCase(caseId);

        // Approver Modal State
        const [showApprovalModal, setShowApprovalModal] = useState(false);
        const [approvalAction, setApprovalAction] = useState(null);
        const [rationale, setRationale] = useState("");
        const [rationaleError, setRationaleError] = useState(false);
        // Screening State
        const [screeningRunning, setScreeningRunning] = useState(false);
        const [showSoftGate, setShowSoftGate] = useState(false);
        // Decision State
        const [caseAssessment, setCaseAssessment] = useState(null);
        const [recheckTriggered, setRecheckTriggered] = useState(false);

        if (!caseData) {
            return React.createElement("div", { className: "text-gray-400 p-8" }, "Case not found");
        }

        const canStartScreening = caseData.status === "draft" &&
            (currentUser.role === "case_creator" || currentUser.role === "approver");

        const allPillarsComplete = screeningResults.length > 0 && embargoResults.length > 0 &&
            classificationResults.length > 0 && endUseResults.length > 0;

        const canSubmitAssessment = caseData.status === "in_pruefung" && allPillarsComplete &&
            (currentUser.role === "case_creator" && caseData.createdBy === currentUser.id);

        const canApprove = caseData.status === "bewertet" &&
            (currentUser.role === "approver" || currentUser.role === "admin") &&
            caseData.createdBy !== currentUser.id;

        const canRevokeApproval = caseData.status === "freigegeben" &&
            (currentUser.role === "approver" || currentUser.role === "admin");

        const hasScreeningResults = screeningResults.length > 0;
        const hasEmbargoResults = embargoResults.length > 0;
        const hasClassificationResults = classificationResults.length > 0;
        const hasEndUseResults = endUseResults.length > 0;

        const runScreening = (softGateRationale) => {
            setScreeningRunning(true);
            setShowSoftGate(false);

            // Mark soft gate on case if applicable
            if (softGateRationale) {
                updateCase(caseId, {
                    sourceOutdatedWarning: true,
                    sourceOutdatedNote: softGateRationale,
                }, currentUser.id);
            }

            // Simulate async screening (setTimeout for demo UX)
            setTimeout(() => {
                // 1. Run sanctions screening against all parties
                const screenResults = ScreeningService.screenCase(caseData);
                for (const partyResult of screenResults) {
                    if (partyResult.matches.length > 0) {
                        for (const match of partyResult.matches) {
                            addScreeningResult({
                                caseId,
                                entityName: partyResult.partyName,
                                entityRole: partyResult.partyRole,
                                listSource: match.sanctionEntry.listSource,
                                matchScore: match.matchScore,
                                matchType: match.matchType,
                                matchedEntry: match.matchedName,
                                matchedEntryId: match.sanctionEntry.id,
                                trefferDecision: null,
                                trefferRationale: "",
                                searchParameters: {
                                    reason: match.sanctionEntry.reason,
                                    regulation: match.sanctionEntry.regulation,
                                    entityType: match.sanctionEntry.entityType,
                                    country: match.sanctionEntry.country,
                                },
                                sourceVersion: "Demo v1.0",
                                sourceTimestamp: new Date().toISOString(),
                                screenedBy: currentUser.id,
                            });
                        }
                    } else {
                        // No match — log a "no match" result
                        addScreeningResult({
                            caseId,
                            entityName: partyResult.partyName,
                            entityRole: partyResult.partyRole,
                            listSource: "ALL",
                            matchScore: 0,
                            matchType: "none",
                            matchedEntry: "",
                            matchedEntryId: "",
                            trefferDecision: "cleared",
                            trefferRationale: language === "de" ? "Kein Treffer in Sanktionslisten" : "No match in sanctions lists",
                            searchParameters: {},
                            sourceVersion: "Demo v1.0",
                            sourceTimestamp: new Date().toISOString(),
                            screenedBy: currentUser.id,
                        });
                    }
                }

                // 2. Run embargo check
                const embargoChecks = EmbargoService.checkCase(caseData);
                for (const check of embargoChecks) {
                    addEmbargoResult({
                        caseId,
                        countryCode: check.countryCode,
                        countryName: COUNTRIES[check.countryCode]?.[language] || check.countryCode,
                        countryRole: check.countryRole,
                        isRestricted: check.isRestricted,
                        restrictionType: check.restrictionType || "",
                        applicableRegulations: (check.regulations || []).map(r => r.ref).join(", "),
                        resultStatus: check.resultStatus,
                        label_de: check.label_de || "",
                        label_en: check.label_en || "",
                        regulations: check.regulations || [],
                        rationale: "",
                        legalSourceVersion: "Demo v1.0",
                        checkedBy: currentUser.id,
                    });
                }

                // 3. Run classification (Säule 3 — keyword-based demo)
                const classResult = ClassificationService.classifyByKeywords(
                    caseData.productDescription, caseData.productType);
                addClassificationResult({
                    caseId,
                    kiSuggestionDualUse: classResult.dualUseNumber,

                            value: opensanctionsKey, onChange: (e) => setOpensanctionsKey(e.target.value),
                            placeholder: "optional",
                        }),
                    ),
                ),
            ),
            // Demo Mode
            React.createElement("div", { className: "bg-white rounded-xl border p-6 mb-6" },
                React.createElement("div", { className: "flex items-center justify-between" },
                    React.createElement("div", null,
                        React.createElement("h3", { className: "font-medium text-gray-700" }, t("settings_demo_mode")),
                        React.createElement("p", { className: "text-sm text-gray-500" }, t("settings_demo_mode_desc")),
                    ),
                    React.createElement("button", {
                        className: `relative inline-flex h-6 w-11 items-center rounded-full transition ${demoMode ? "bg-axc-primary" : "bg-gray-300"}`,
                        onClick: () => setDemoMode(!demoMode),
                    },
                        React.createElement("span", {
                            className: `inline-block h-4 w-4 transform rounded-full bg-white transition ${demoMode ? "translate-x-6" : "translate-x-1"}`,
                        }),
                    ),
                ),
            ),
            // Save
            React.createElement("div", { className: "flex justify-end" },
                React.createElement("button", {
                    className: "px-6 py-2 bg-axc-primary text-white rounded-lg hover:bg-axc-primary-dark transition text-sm font-medium",
                    onClick: handleSave,
                }, saved ? `✓ ${t("settings_saved")}` : t("settings_save")),
            ),
        );
    }

    // --- Admin Panel ---
    function AdminPanel() {
        const { t, language } = useI18n();
        const { db, getUserById } = useData();

        const roleLabels = { case_creator: t("role_case_creator"), approver: t("role_approver"), admin: t("role_admin") };

        const handleExportJson = () => {
            const exportData = {
                exportedAt: new Date().toISOString(),
                appVersion: APP_CONFIG.appVersion,
                cases: db.cases,
                screeningResults: db.screeningResults,
                embargoResults: db.embargoResults,
                classificationResults: db.classificationResults,
                endUseResults: db.endUseResults,
                auditLog: db.auditLog,
            };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `AIxportControls_Export_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        return React.createElement("div", { className: "animate-fade-in" },
            React.createElement("h1", { className: "text-2xl font-bold text-gray-800 mb-6" }, t("admin_title")),

            // System Stats
            React.createElement("div", { className: "grid grid-cols-1 sm:grid-cols-4 gap-4 mb-6" },
                React.createElement("div", { className: "bg-blue-50 rounded-xl p-4" },
                    React.createElement("div", { className: "text-xs text-gray-500" }, t("admin_total_cases")),
                    React.createElement("div", { className: "text-2xl font-bold text-axc-primary" }, db.cases.length),
                ),
                React.createElement("div", { className: "bg-green-50 rounded-xl p-4" },
                    React.createElement("div", { className: "text-xs text-gray-500" }, t("admin_total_screenings")),
                    React.createElement("div", { className: "text-2xl font-bold text-green-600" }, db.screeningResults.length),
                ),
                React.createElement("div", { className: "bg-amber-50 rounded-xl p-4" },
                    React.createElement("div", { className: "text-xs text-gray-500" }, t("admin_total_audit")),
                    React.createElement("div", { className: "text-2xl font-bold text-amber-600" }, db.auditLog.length),
                ),
                React.createElement("div", { className: "bg-gray-50 rounded-xl p-4 flex items-center justify-center" },
                    React.createElement("button", {
                        className: "flex items-center gap-2 text-sm text-axc-primary hover:underline font-medium",
                        onClick: handleExportJson,
                    },
                        React.createElement(SvgIcon, { type: "file-text", size: 16 }),
                        t("admin_export_json"),
                    ),
                ),
            ),

            // Users table
            React.createElement("div", { className: "bg-white rounded-xl border overflow-hidden mb-6" },
                React.createElement("div", { className: "px-5 py-3 border-b bg-gray-50" },
                    React.createElement("h2", { className: "font-semibold text-gray-700" }, t("admin_users")),
                ),
                React.createElement("table", { className: "w-full text-sm" },
                    React.createElement("thead", null,
                        React.createElement("tr", { className: "text-left text-xs text-gray-500 uppercase tracking-wider border-b" },
                            React.createElement("th", { className: "px-4 py-3" }, t("admin_user_name")),
                            React.createElement("th", { className: "px-4 py-3" }, t("admin_user_email")),
                            React.createElement("th", { className: "px-4 py-3" }, t("admin_user_role")),
                            React.createElement("th", { className: "px-4 py-3" }, t("admin_user_active")),
                        ),
                    ),
                    React.createElement("tbody", { className: "divide-y" },
                        db.users.map(u =>
                            React.createElement("tr", { key: u.id },
                                React.createElement("td", { className: "px-4 py-3 font-medium" }, u.fullName),
                                React.createElement("td", { className: "px-4 py-3 text-gray-500" }, u.email),
                                React.createElement("td", { className: "px-4 py-3" }, roleLabels[u.role]),
                                React.createElement("td", { className: "px-4 py-3" },
                                    React.createElement("span", { className: `w-2 h-2 rounded-full inline-block ${u.isActive ? "bg-green-500" : "bg-red-500"}` }),
                                ),
                            ),
                        ),
                    ),
                ),
            ),
            // Audit Log
            React.createElement("div", { className: "bg-white rounded-xl border overflow-hidden" },
                React.createElement("div", { className: "px-5 py-3 border-b bg-gray-50" },
                    React.createElement("h2", { className: "font-semibold text-gray-700" }, t("admin_audit_log")),
                ),
                React.createElement("div", { className: "max-h-96 overflow-y-auto" },
                    db.auditLog.length === 0
                        ? React.createElement("p", { className: "p-5 text-sm text-gray-400" }, t("common_no_data"))
                        : React.createElement("table", { className: "w-full text-xs" },
                            React.createElement("thead", null,
                                React.createElement("tr", { className: "text-left text-gray-500 uppercase tracking-wider border-b" },
                                    React.createElement("th", { className: "px-4 py-2" }, "Timestamp"),
                                    React.createElement("th", { className: "px-4 py-2" }, "User"),
                                    React.createElement("th", { className: "px-4 py-2" }, "Action"),
                                    React.createElement("th", { className: "px-4 py-2" }, "Case"),
                                ),
                            ),
                            React.createElement("tbody", { className: "divide-y" },
                                [...db.auditLog].reverse().map(entry => {
                                    const user = getUserById(entry.userId);
                                    const c = db.cases.find(c => c.id === entry.caseId);
                                    return React.createElement("tr", { key: entry.id },
                                        React.createElement("td", { className: "px-4 py-2 text-gray-500 whitespace-nowrap" }, formatDate(entry.timestamp)),
                                        React.createElement("td", { className: "px-4 py-2" }, user?.fullName || "System"),
                                        React.createElement("td", { className: "px-4 py-2" }, t("audit_action_" + entry.action)),
                                        React.createElement("td", { className: "px-4 py-2 font-mono text-axc-primary" }, c?.caseNumber || "—"),
                                    );
                                }),
                            ),
                        ),
                ),
            ),
        );
    }

    // --- Monitoring Page (Placeholder) ---
    function MonitoringPage() {
        const { t, language } = useI18n();
        const { db } = useData();

        return React.createElement("div", { className: "animate-fade-in" },
            React.createElement("h1", { className: "text-2xl font-bold text-gray-800 mb-6" }, t("nav_monitoring")),
            React.createElement("div", { className: "bg-white rounded-xl border p-6" },
                React.createElement("h2", { className: "font-semibold text-gray-700 mb-4" },
                    language === "de" ? "Rechtsquellen-Status" : "Legal Source Status"),
                React.createElement("div", { className: "space-y-3" },
                    db.legalSourceVersions.filter(s => s.isCurrent).map(source => {
                        const hoursAgo = Math.round((Date.now() - new Date(source.fetchedAt).getTime()) / 3600000);
                        const isStale = hoursAgo > db.config.sourceStalenessHours;
                        return React.createElement("div", { key: source.id, className: `flex items-center justify-between p-4 rounded-lg ${isStale ? "bg-amber-50 border border-amber-200" : "bg-green-50 border border-green-200"}` },
                            React.createElement("div", null,
                                React.createElement("div", { className: "font-medium text-sm" }, source.sourceName),
                                React.createElement("div", { className: "text-xs text-gray-500" }, source.celexNumber),
                            ),
                            React.createElement("div", { className: "text-right" },
                                React.createElement("div", { className: `text-xs font-medium ${isStale ? "text-amber-600" : "text-green-600"}` },
                                    isStale
                                        ? (language === "de" ? "Nicht aktuell" : "Outdated")
                                        : (language === "de" ? "Aktuell" : "Current")),
                                React.createElement("div", { className: "text-xs text-gray-400" },
                                    language === "de" ? `Vor ${hoursAgo}h abgerufen` : `Fetched ${hoursAgo}h ago`),
                            ),
                        );
                    }),
                ),
            ),
        );
    }

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 5: APP (Router + Layout + Auth Guard)
    // ══════════════════════════════════════════════════════════════════

    function AppContent() {
        const { currentUser } = useAuth();
        const [currentPage, setCurrentPage] = useState("dashboard");
        const [selectedCaseId, setSelectedCaseId] = useState(null);

        if (!currentUser) {
            return React.createElement(LoginPage);
        }

        let pageContent;
        switch (currentPage) {
            case "dashboard":
                pageContent = React.createElement(Dashboard, { setCurrentPage, setSelectedCaseId });
                break;
            case "cases":
                pageContent = React.createElement(CaseList, { setCurrentPage, setSelectedCaseId });
                break;
            case "case_create":
                pageContent = React.createElement(CaseCreateForm, { setCurrentPage });
                break;
            case "case_detail":
                pageContent = React.createElement(CaseDetailView, { caseId: selectedCaseId, setCurrentPage });
                break;
            case "approver_inbox":
                pageContent = React.createElement(ApproverInbox, { setCurrentPage, setSelectedCaseId });
                break;
            case "settings":
                pageContent = React.createElement(SettingsPage);
                break;
            case "admin":
                pageContent = React.createElement(AdminPanel);
                break;
            case "monitoring":
                pageContent = React.createElement(MonitoringPage);
                break;
            default:
                pageContent = React.createElement(Dashboard, { setCurrentPage, setSelectedCaseId });
        }

        return React.createElement("div", { className: "flex min-h-screen" },
            React.createElement(Sidebar, { currentPage, setCurrentPage }),
            React.createElement("div", { className: "flex-1 flex flex-col" },
                React.createElement(Header),
                React.createElement("main", { className: "flex-1 p-6" }, pageContent),
                // Footer
                React.createElement("footer", { className: "px-6 py-3 text-center text-xs text-gray-400 border-t" },
                    `${APP_CONFIG.appName} v${APP_CONFIG.appVersion} — Prototype / PoC — ${new Date().getFullYear()}`,
                ),
            ),
        );
    }

    function App() {
        return React.createElement(I18nProvider, null,
            React.createElement(DataProvider, null,
                React.createElement(AuthProvider, null,
                    React.createElement(AppContent),
                ),
            ),
        );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    </script>
</body>
</html>
