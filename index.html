    // --- Chat State Machine ---
    const CHAT_FLOW = [
        "welcome", "doc_upload", "doc_analysis",
        "collect_party_name", "collect_party_country", "collect_party_role",
        "ask_more_parties", "collect_destination", "collect_dispatch", "ask_transit",
        "collect_product_type", "collect_product_desc", "collect_enduse",
        "collect_delivery_date", "collect_value", "ask_documents",
        "confirm", "running_screening", "show_results", "enduse_questions", "done",
    ];

    function useChatEngine() {
        const { t, language } = useI18n();
        const { currentUser } = useAuth();
        const { createCase, addScreeningResult, addEmbargoResult, addClassificationResult,
                addEndUseResult, addAuditEntry, addDocument, transitionCaseStatus,
                updateCase, isSourceStale, db } = useData();

        const [messages, setMessages] = useState([]);
        const [step, setStep] = useState("welcome");
        const [caseData, setCaseData] = useState({
            parties: [], dispatchCountry: "DE", destinationCountry: "", transitCountries: [],
            productType: "", productDescription: "", endUseDescription: "",
            plannedDeliveryDate: "", valueEur: "", quantity: "",
        });
        const [currentParty, setCurrentParty] = useState({ name: "", country: "", role: "buyer" });
        const [uploadedDocs, setUploadedDocs] = useState([]);
        const [docAnalysis, setDocAnalysis] = useState(null);
        const [createdCaseId, setCreatedCaseId] = useState(null);
        const [screeningDone, setScreeningDone] = useState(false);
        const [endUseStep, setEndUseStep] = useState(0);
        const [endUseResponses, setEndUseResponses] = useState([]);

        const addBot = useCallback((content, extras = {}) => {
            setMessages(prev => [...prev, { id: Date.now() + Math.random(), role: "bot", content, timestamp: new Date(), ...extras }]);
        }, []);

        const addUser = useCallback((content, extras = {}) => {
            setMessages(prev => [...prev, { id: Date.now() + Math.random(), role: "user", content, timestamp: new Date(), ...extras }]);
        }, []);

        // Initialize with welcome
        useEffect(() => {
            if (messages.length === 0) {
                addBot(t("chat_welcome"), { actions: [
                    { label: t("chat_new_case"), value: "new_case" },
                    { label: t("chat_upload_doc"), value: "upload_doc" },
                ]});
            }
        }, []);

        const processInput = useCallback((input, inputType = "text", displayLabel) => {
            if (inputType === "text" && input.trim()) addUser(displayLabel || input);

            switch (step) {
                case "welcome":
                    if (input === "new_case") {
                        setStep("collect_party_name");
                        addBot(t("chat_section_parties"));
                        setTimeout(() => addBot(t("chat_ask_party_name")), 400);
                    } else if (input === "upload_doc") {
                        setStep("doc_upload");
                        addBot(t("chat_section_docs") + "\n\n" + t("chat_upload_hint"), { showFileUpload: true });
                    }
                    break;

                case "doc_upload":
                    // Handled by handleFileUpload; user can also skip
                    if (input === "skip") {
                        setStep("collect_party_name");
                        addBot(t("chat_section_parties"));
                        setTimeout(() => addBot(t("chat_ask_party_name")), 400);
                    }
                    break;

                case "doc_analysis":
                    if (input === "use_data") {
                        // Apply extracted data to case and continue with pre-filled flow
                        if (docAnalysis) {
                            const extractedData = DocumentAnalyzer.toCaseData(docAnalysis);
                            setCaseData(prev => {
                                const merged = {
                                    ...prev,
                                    ...extractedData,
                                    parties: extractedData.parties && extractedData.parties.length > 0 ? extractedData.parties : prev.parties,
                                };
                                // Show confirmation with merged data after state update
                                setTimeout(() => {
                                    const tCountry = (code) => COUNTRIES[code]?.[language] || code;
                                    const summary = [
                                        `**${t("chat_parties_label")}:** ${merged.parties.map(p => `${p.name} (${tCountry(p.country)}, ${p.role})`).join("; ")}`,
                                        `**${t("chat_countries_label")}:** ${tCountry(merged.dispatchCountry)} → ${tCountry(merged.destinationCountry)}${merged.transitCountries.length ? ` (via ${merged.transitCountries.map(c => tCountry(c)).join(", ")})` : ""}`,
                                        `**${t("chat_product_label")}:** ${PRODUCT_TYPES[merged.productType]?.[language] || merged.productType || "—"} — ${merged.productDescription || "—"}`,
                                        merged.endUseDescription ? `**${t("case_enduse")}:** ${merged.endUseDescription}` : null,
                                        merged.valueEur ? `**${t("case_value")}:** € ${Number(merged.valueEur).toLocaleString("de-DE")}` : null,
                                        uploadedDocs.length > 0 ? `**${t("chat_file_uploaded")}:** ${uploadedDocs.map(d => d.fileName).join(", ")}` : null,
                                    ].filter(Boolean).join("\n");
                                    addBot(`📋 **${t("chat_confirm_title")}**\n\n${summary}\n\n${t("chat_confirm_prompt")}`, {
                                        type: "summary",
                                        actions: [
                                            { label: t("chat_confirm_yes"), value: "confirm" },
                                            { label: t("chat_confirm_edit"), value: "edit" },
                                        ],
                                    });
                                }, 100);
                                return merged;
                            });
                        }
                        addBot(t("chat_analysis_prefilled"));
                        setStep("confirm");
                    } else if (input === "manual") {
                        // Start manual flow but with pre-filled suggestions
                        if (docAnalysis) {
                            const extractedData = DocumentAnalyzer.toCaseData(docAnalysis);
                            setCaseData(prev => ({ ...prev, ...extractedData, parties: [] }));
                        }
                        setStep("collect_party_name");
                        addBot(t("chat_section_parties"));
                        setTimeout(() => addBot(t("chat_ask_party_name")), 400);
                    } else if (input === "add_doc") {
                        setStep("doc_upload");
                        addBot(t("chat_upload_hint"), { showFileUpload: true });
                    }
                    break;

                case "collect_party_name":
                    setCurrentParty(prev => ({ ...prev, name: input }));
                    setStep("collect_party_country");
                    addBot(t("chat_ask_party_country").replace("{name}", input), { actions: [
                        { label: "DE 🇩🇪", value: "DE" }, { label: "RU 🇷🇺", value: "RU" },
                        { label: "CN 🇨🇳", value: "CN" }, { label: "US 🇺🇸", value: "US" },
                        { label: "IR 🇮🇷", value: "IR" }, { label: "BY 🇧🇾", value: "BY" },
                        { label: "KP 🇰🇵", value: "KP" }, { label: "SY 🇸🇾", value: "SY" },
                    ]});
                    break;

                case "collect_party_country":
                    setCurrentParty(prev => ({ ...prev, country: input.toUpperCase().slice(0, 2) }));
                    setStep("collect_party_role");
                    addBot(t("chat_ask_party_role").replace("{name}", currentParty.name), { actions: [
                        { label: t("case_party_role_buyer"), value: "buyer" },
                        { label: t("case_party_role_enduser"), value: "enduser" },
                        { label: t("case_party_role_intermediary"), value: "intermediary" },
                        { label: t("case_party_role_freight"), value: "freight" },
                    ]});
                    break;

                case "collect_party_role": {
                    const newParty = { ...currentParty, role: input, country: currentParty.country };
                    setCaseData(prev => ({ ...prev, parties: [...prev.parties, newParty] }));
                    setCurrentParty({ name: "", country: "", role: "buyer" });
                    setStep("ask_more_parties");
                    const tCountry = COUNTRIES[newParty.country]?.[language] || newParty.country;
                    addBot(t("chat_party_added").replace("{name}", newParty.name).replace("{country}", tCountry).replace("{role}", newParty.role), { actions: [
                        { label: `${t("common_yes")} — weitere Partei`, value: "yes" },
                        { label: `${t("common_no")} — weiter`, value: "no" },
                    ]});
                    break;
                }

                case "ask_more_parties":
                    if (input === "yes") {
                        setStep("collect_party_name");
                        addBot(t("chat_ask_party_name"));
                    } else {
                        setStep("collect_destination");
                        addBot(t("chat_section_countries"));
                        setTimeout(() => addBot(t("chat_ask_destination"), { actions: [
                            { label: "RU 🇷🇺", value: "RU" }, { label: "CN 🇨🇳", value: "CN" },
                            { label: "IR 🇮🇷", value: "IR" }, { label: "US 🇺🇸", value: "US" },
                            { label: "KP 🇰🇵", value: "KP" }, { label: "BY 🇧🇾", value: "BY" },
                            { label: "SY 🇸🇾", value: "SY" }, { label: "AE 🇦🇪", value: "AE" },
                        ]}), 400);
                    }
                    break;

                case "collect_destination":
                    setCaseData(prev => ({ ...prev, destinationCountry: input.toUpperCase().slice(0, 2) }));
                    setStep("collect_dispatch");
                    addBot(t("chat_ask_dispatch"), { actions: [
                        { label: "DE 🇩🇪", value: "DE" }, { label: "CH 🇨🇭", value: "CH" },
                        { label: "AT 🇦🇹", value: "AT" }, { label: "NL 🇳🇱", value: "NL" },
                    ]});
                    break;

                case "collect_dispatch":
                    setCaseData(prev => ({ ...prev, dispatchCountry: input.toUpperCase().slice(0, 2) }));
                    setStep("ask_transit");
                    addBot(t("chat_ask_transit"), { actions: [
                        { label: `${t("common_no")} — weiter`, value: "no" },
                        { label: "TR 🇹🇷", value: "TR" }, { label: "AE 🇦🇪", value: "AE" },
                        { label: "KZ 🇰🇿", value: "KZ" }, { label: "GE 🇬🇪", value: "GE" },
                    ]});
                    break;

                case "ask_transit":
                    if (input !== "no") {
                        setCaseData(prev => ({ ...prev, transitCountries: [...prev.transitCountries, input.toUpperCase().slice(0, 2)] }));
                        const tName = COUNTRIES[input.toUpperCase().slice(0, 2)]?.[language] || input;
                        addBot(`✓ ${tName}\n\n${t("chat_ask_transit")}`, { actions: [
                            { label: `${t("common_no")} — weiter`, value: "no" },
                            { label: "TR 🇹🇷", value: "TR" }, { label: "AE 🇦🇪", value: "AE" },
                        ]});
                    } else {
                        setStep("collect_product_type");
                        addBot(t("chat_section_product"));
                        setTimeout(() => addBot(t("chat_ask_product_type"), { actions:
                            Object.entries(PRODUCT_TYPES).map(([k, v]) => ({ label: v[language], value: k }))
                        }), 400);
                    }
                    break;

                case "collect_product_type":
                    setCaseData(prev => ({ ...prev, productType: input }));
                    setStep("collect_product_desc");
                    addBot(t("chat_ask_product_desc"));
                    break;

                case "collect_product_desc":
                    setCaseData(prev => ({ ...prev, productDescription: input }));
                    setStep("collect_enduse");
                    addBot(t("chat_section_enduse"));
                    setTimeout(() => addBot(t("chat_ask_enduse")), 400);
                    break;

                case "collect_enduse":
                    setCaseData(prev => ({ ...prev, endUseDescription: input }));
                    setStep("collect_delivery_date");
                    addBot(t("chat_section_meta"));
                    setTimeout(() => addBot(t("chat_ask_delivery_date"), { actions: [
                        { label: `${t("common_skip")} ⏭️`, value: "skip" },
                    ]}), 400);
                    break;

                case "collect_delivery_date":
                    if (input !== "skip") setCaseData(prev => ({ ...prev, plannedDeliveryDate: input }));
                    setStep("collect_value");
                    addBot(t("chat_ask_value"), { actions: [
                        { label: `${t("common_skip")} ⏭️`, value: "skip" },
                    ]});
                    break;

                case "collect_value":
                    if (input !== "skip") setCaseData(prev => ({ ...prev, valueEur: parseFloat(input) || "" }));
                    setStep("ask_documents");
                    addBot(t("chat_section_docs"));
                    setTimeout(() => addBot(t("chat_ask_documents"), { actions: [
                        { label: `${t("common_next")} → ${t("chat_confirm_title")}`, value: "skip" },
                    ], showFileUpload: true }), 400);
                    break;

                case "ask_documents":
                    if (input === "skip") {
                        setStep("confirm");
                        setTimeout(() => showConfirmation(), 50);
                    }
                    break;

                case "confirm":
                    if (input === "confirm") {
                        runScreening();
                    } else if (input === "edit") {
                        setCaseData(prev => ({ ...prev, parties: [] }));
                        setStep("collect_party_name");
                        addBot(t("chat_ask_party_name"));
                    }
                    break;

                case "enduse_questions": {
                    const q = RED_FLAG_CATALOG[endUseStep];
                    if (q) {
                        setEndUseResponses(prev => [...prev, { questionId: q.id, answer: input }]);
                        const nextIdx = endUseStep + 1;
                        if (nextIdx < RED_FLAG_CATALOG.length) {
                            setEndUseStep(nextIdx);
                            const nq = RED_FLAG_CATALOG[nextIdx];
                            addBot(`${nextIdx + 1}/${RED_FLAG_CATALOG.length}: ${language === "de" ? nq.de : nq.en}`, { actions: [
                                { label: t("enduse_answer_yes"), value: "yes" },
                                { label: t("enduse_answer_no"), value: "no" },
                                { label: t("enduse_answer_unknown"), value: "unknown" },
                            ]});
                        } else {
                            finishEndUse([...endUseResponses, { questionId: q.id, answer: input }]);
                        }
                    }
                    break;
                }

                case "show_results":
                    if (input === "submit") {
                        submitForApproval();
                    } else if (input === "pdf") {
                        generatePdf();
                    } else if (input === "new") {
                        resetChat();
                    }
                    break;

                case "done":
                    if (input === "new") resetChat();
                    break;
            }
        }, [step, caseData, currentParty, endUseStep, endUseResponses, language, t, createdCaseId, docAnalysis]);

        const showConfirmation = () => {
            const tCountry = (code) => COUNTRIES[code]?.[language] || code;
            const summary = [
                `**${t("chat_parties_label")}:** ${caseData.parties.map(p => `${p.name} (${tCountry(p.country)}, ${p.role})`).join("; ")}`,
                `**${t("chat_countries_label")}:** ${tCountry(caseData.dispatchCountry)} → ${tCountry(caseData.destinationCountry)}${caseData.transitCountries.length ? ` (via ${caseData.transitCountries.map(c => tCountry(c)).join(", ")})` : ""}`,
                `**${t("chat_product_label")}:** ${PRODUCT_TYPES[caseData.productType]?.[language] || caseData.productType} — ${caseData.productDescription}`,
                caseData.endUseDescription ? `**${t("case_enduse")}:** ${caseData.endUseDescription}` : null,
                caseData.valueEur ? `**${t("case_value")}:** € ${Number(caseData.valueEur).toLocaleString("de-DE")}` : null,
                uploadedDocs.length > 0 ? `**${t("chat_file_uploaded")}:** ${uploadedDocs.map(d => d.fileName).join(", ")}` : null,
            ].filter(Boolean).join("\n");

            addBot(`📋 **${t("chat_confirm_title")}**\n\n${summary}\n\n${t("chat_confirm_prompt")}`, {
                type: "summary",
                actions: [
                    { label: t("chat_confirm_yes"), value: "confirm" },
                    { label: t("chat_confirm_edit"), value: "edit" },
                ],
            });
        };

        // Use ref to always have current step available in async handlers
        const stepRef = useRef(step);
        useEffect(() => { stepRef.current = step; }, [step]);

        const handleFileUpload = async (files) => {
            // Normalize: accept single File or array of Files
            const fileList = Array.isArray(files) ? files : [files];
            if (fileList.length === 0) return;

            // Show user message with all file names
            const names = fileList.map(f => f.name);
            addUser(`📎 ${names.join(", ")}`, { type: "file" });
            addBot(t("chat_analyzing_doc").replace("{name}", names.join(", ")), { type: "loading" });

            let mergedAnalysis = null;

            try {
                // Process all files sequentially
                for (const file of fileList) {
                    const result = await FileHandler.extractText(file);
                    const doc = { fileName: file.name, fileType: file.type, extractedText: result.text, pages: result.pages };
                    setUploadedDocs(prev => [...prev, doc]);

                    // Run document analysis for this file
                    const analysis = DocumentAnalyzer.analyze(result.text, language);

                    // Merge into combined analysis
                    if (mergedAnalysis) {
                        mergedAnalysis = {
                            ...mergedAnalysis,
                            parties: [...mergedAnalysis.parties, ...analysis.parties.filter(p => !mergedAnalysis.parties.some(pp => pp.name === p.name))],
                            countries: [...new Set([...mergedAnalysis.countries, ...analysis.countries])],
                            products: [...new Set([...mergedAnalysis.products, ...analysis.products])],
                            values: [...new Set([...mergedAnalysis.values, ...analysis.values])],
                            dates: [...new Set([...mergedAnalysis.dates, ...analysis.dates])],
                            endUseHints: [...mergedAnalysis.endUseHints, ...analysis.endUseHints.filter(h => !mergedAnalysis.endUseHints.some(ph => ph.keyword === h.keyword))],
                            dualUseHints: [...new Set([...mergedAnalysis.dualUseHints, ...analysis.dualUseHints])],
                            rawText: mergedAnalysis.rawText + "\n\n---\n\n" + result.text,
                            confidence: analysis.confidence === "high" || mergedAnalysis.confidence === "high" ? "high" : analysis.confidence === "medium" || mergedAnalysis.confidence === "medium" ? "medium" : "low",
                        };
                    } else {
                        mergedAnalysis = analysis;
                    }
                }

                // Merge with any existing docAnalysis state
                setDocAnalysis(prev => {
                    if (prev && mergedAnalysis) {
                        return {
                            ...prev,
                            parties: [...prev.parties, ...mergedAnalysis.parties.filter(p => !prev.parties.some(pp => pp.name === p.name))],
                            countries: [...new Set([...prev.countries, ...mergedAnalysis.countries])],
                            products: [...new Set([...prev.products, ...mergedAnalysis.products])],
                            values: [...new Set([...prev.values, ...mergedAnalysis.values])],
                            dates: [...new Set([...prev.dates, ...mergedAnalysis.dates])],
                            endUseHints: [...prev.endUseHints, ...mergedAnalysis.endUseHints.filter(h => !prev.endUseHints.some(ph => ph.keyword === h.keyword))],
                            dualUseHints: [...new Set([...prev.dualUseHints, ...mergedAnalysis.dualUseHints])],
                            rawText: prev.rawText + "\n\n---\n\n" + mergedAnalysis.rawText,
                            confidence: mergedAnalysis.confidence === "high" || prev.confidence === "high" ? "high" : mergedAnalysis.confidence === "medium" || prev.confidence === "medium" ? "medium" : "low",
                        };
                    }
                    return mergedAnalysis;
                });

                // Use ref to get current step (avoids stale closure)
                const currentStep = stepRef.current;
                const isDocPhase = currentStep === "doc_upload" || currentStep === "welcome" || currentStep === "doc_analysis";

                if (isDocPhase && mergedAnalysis) {
                    const summary = DocumentAnalyzer.formatSummary(mergedAnalysis, t, language);
                    const hasInfo = mergedAnalysis.parties.length > 0 || mergedAnalysis.countries.length > 0 ||
                        mergedAnalysis.products.length > 0 || mergedAnalysis.dualUseHints.length > 0;

                    if (hasInfo) {
                        setTimeout(() => {
                            addBot(t("chat_analysis_complete") + "\n\n" + summary + "\n" + t("chat_analysis_confirm"), {
                                type: "analysis",
                                actions: [
                                    { label: t("chat_analysis_use_data"), value: "use_data" },
                                    { label: t("chat_analysis_manual"), value: "manual" },
                                    { label: t("chat_analysis_add_doc"), value: "add_doc" },
                                ],
                            });
                            setStep("doc_analysis");
                        }, 500);
                    } else {
                        setTimeout(() => {
                            addBot(t("chat_analysis_no_info"), {
                                actions: [
                                    { label: t("chat_analysis_add_doc"), value: "add_doc" },
                                    { label: t("chat_analysis_manual"), value: "manual" },
                                ],
                            });
                            setStep("doc_analysis");
                        }, 500);
                    }
                } else {
                    // Mid-flow upload: just acknowledge and continue
                    setTimeout(() => {
                        addBot(t("chat_doc_uploaded_continue")
                            .replace("{name}", names.join(", "))
                            .replace("{chars}", mergedAnalysis?.rawText?.length || 0)
                            .replace("{pages}", fileList.length + " Dok."), { type: "file_result" });

                        if (currentStep === "ask_documents") {
                            addBot(t("chat_ask_documents"), { actions: [
                                { label: t("common_next") + " →", value: "skip" },
                            ], showFileUpload: true });
                        }
                    }, 300);
                }
            } catch (err) {
                addBot(`❌ ${t("csv_import_error")}: ${err.message}`);
            }
        };

        const runScreening = () => {
            setStep("running_screening");
            addBot(`⏳ ${t("chat_screening_started")}`, { type: "loading" });

            // Create the case first
            const newCase = createCase({
                ...caseData,
                createdBy: currentUser.id,
            });
            const cId = newCase.id;
            setCreatedCaseId(cId);

            // Store documents
            for (const doc of uploadedDocs) {
                addDocument({ caseId: cId, ...doc });
            }

            setTimeout(() => {
                // 1. Sanctions screening
                const screenResults = ScreeningService.screenCase(caseData);
                for (const partyResult of screenResults) {
                    if (partyResult.matches.length > 0) {
                        for (const match of partyResult.matches) {
                            addScreeningResult({
                                caseId: cId, entityName: partyResult.partyName, entityRole: partyResult.partyRole,
                                listSource: match.sanctionEntry.listSource, matchScore: match.matchScore,
                                matchType: match.matchType, matchedEntry: match.matchedName,
                                matchedEntryId: match.sanctionEntry.id, trefferDecision: null, trefferRationale: "",
                                searchParameters: { reason: match.sanctionEntry.reason, regulation: match.sanctionEntry.regulation,
                                    entityType: match.sanctionEntry.entityType, country: match.sanctionEntry.country },
                                sourceVersion: "Demo v1.0", sourceTimestamp: new Date().toISOString(), screenedBy: currentUser.id,
                            });
                        }
                    } else {
                        addScreeningResult({
                            caseId: cId, entityName: partyResult.partyName, entityRole: partyResult.partyRole,
                            listSource: "ALL", matchScore: 0, matchType: "none", matchedEntry: "", matchedEntryId: "",
                            trefferDecision: "cleared", trefferRationale: language === "de" ? "Kein Treffer" : "No match",
                            searchParameters: {}, sourceVersion: "Demo v1.0", sourceTimestamp: new Date().toISOString(),
                            screenedBy: currentUser.id,
                        });
                    }
                }
                addBot(`✅ ${t("chat_screening_pillar")} 1: ${t("screening_title")} — ${t("chat_screening_result")}`, { type: "pillar_done", pillar: 1 });

                // 2. Embargo
                const embargoChecks = EmbargoService.checkCase(caseData);
                for (const check of embargoChecks) {
                    addEmbargoResult({
                        caseId: cId, countryCode: check.countryCode,
                        countryName: COUNTRIES[check.countryCode]?.[language] || check.countryCode,
                        countryRole: check.countryRole, isRestricted: check.isRestricted,
                        restrictionType: check.restrictionType || "", resultStatus: check.resultStatus,
                        applicableRegulations: (check.regulations || []).map(r => r.ref).join(", "),
                        label_de: check.label_de || "", label_en: check.label_en || "",
                        regulations: check.regulations || [], rationale: "",
                        legalSourceVersion: "Demo v1.0", checkedBy: currentUser.id,
                    });
                }
                addBot(`✅ ${t("chat_screening_pillar")} 2: ${t("embargo_title")} — ${t("chat_screening_result")}`, { type: "pillar_done", pillar: 2 });

                // 3. Classification
                const classResult = ClassificationService.classifyByKeywords(caseData.productDescription, caseData.productType);
                addClassificationResult({
                    caseId: cId, kiSuggestionDualUse: classResult.dualUseNumber, kiSuggestionAl: classResult.alNumber,
                    kiSuggestionHsCode: classResult.hsCode, kiConfidence: classResult.confidence,
                    kiReasoning: language === "de" ? classResult.reasoning_de : classResult.reasoning_en,
                    kiModelUsed: "keyword-demo", userDecisionDualUse: "", userDecisionAl: "",
                    userDecisionHsCode: "", userAcceptedKi: null, resultStatus: "", rationale: "",
                    classifiedBy: currentUser.id,
                });
                addBot(`✅ ${t("chat_screening_pillar")} 3: ${t("classification_title")} — ${t("chat_screening_result")}`, { type: "pillar_done", pillar: 3 });

                transitionCaseStatus(cId, "in_pruefung", currentUser.id);

                // 4. Start end use questions
                addBot(`✅ ${t("chat_screening_pillar")} 1-3 ${t("chat_screening_complete")}\n\n${t("chat_enduse_intro")}`, { type: "info" });

                const firstQ = RED_FLAG_CATALOG[0];
                setEndUseStep(0);
                setEndUseResponses([]);
                setStep("enduse_questions");
                addBot(`1/${RED_FLAG_CATALOG.length}: ${language === "de" ? firstQ.de : firstQ.en}`, { actions: [
                    { label: t("enduse_answer_yes"), value: "yes" },
                    { label: t("enduse_answer_no"), value: "no" },
                    { label: t("enduse_answer_unknown"), value: "unknown" },
                ]});

                setScreeningDone(true);
            }, 1500);
        };

        const finishEndUse = (responses) => {
            const evaluation = EndUseService.evaluateResponses(responses);
            addEndUseResult({
                caseId: createdCaseId, questionnaireResponses: responses,
                redFlagsDetected: evaluation.redFlags, resultStatus: evaluation.resultStatus,
                catchAllRelevant: evaluation.catchAllRelevant, rationale: "", checkedBy: currentUser.id,
            });
            addBot(`✅ ${t("chat_screening_pillar")} 4: ${t("enduse_title")} — ${evaluation.resultStatus}`, { type: "pillar_done", pillar: 4 });

            // Run consolidated assessment
            setTimeout(() => {
                const sr = db.screeningResults.filter(r => r.caseId === createdCaseId);
                const er = db.embargoResults.filter(r => r.caseId === createdCaseId);
                const cr = db.classificationResults.filter(r => r.caseId === createdCaseId);
                const eur = db.endUseResults.filter(r => r.caseId === createdCaseId);
                const assessment = DecisionAgent.assess(sr, er, cr, eur, language);

                updateCase(createdCaseId, {
                    riskLevel: assessment.riskLevel,
                    consolidatedAssessment: assessment.overallAssessment,
                    consolidatedReasoning: assessment.reasoning,
                    assessedAt: new Date().toISOString(),
                }, currentUser.id);

                const riskLabels = { blocked: "🔴 BLOCKED", critical: "🔴 CRITICAL", high: "🟠 HIGH", medium: "🟡 MEDIUM", low: "🟢 LOW" };
                const pillarStatus = Object.entries(assessment.pillars).map(([k, v]) => {
                    const icons = { screening: "🛡️", embargo: "🌍", classification: "📦", enduse: "🎯" };
                    const statusIcons = { kritisch: "🔴", pruefpflichtig: "🟡", unauffaellig: "🟢", pending: "⏳" };
                    return `${icons[k]} ${t("decision_pillar_" + (k === "screening" ? 1 : k === "embargo" ? 2 : k === "classification" ? 3 : 4))}: ${statusIcons[v.status] || "⏳"} ${v.label}`;
                }).join("\n");

                addBot(
                    `📊 **${t("chat_assessment_title")}**\n\n` +
                    `**${t("decision_risk_level")}:** ${riskLabels[assessment.riskLevel] || assessment.riskLevel}\n\n` +
                    `${pillarStatus}\n\n` +
                    `**${t("decision_reasoning")}:** ${assessment.reasoning}`,
                    {
                        type: "assessment",
                        actions: [
                            { label: `✓ ${t("chat_submit_approval")}`, value: "submit" },
                            { label: `📄 ${t("chat_download_pdf")}`, value: "pdf" },
                            { label: `🔄 ${t("chat_start_new")}`, value: "new" },
                        ],
                    }
                );
                setStep("show_results");
            }, 500);
        };

        const submitForApproval = () => {
            transitionCaseStatus(createdCaseId, "bewertet", currentUser.id);
            addBot(`✅ **${t("chat_case_submitted")}**\n\nCase: ${db.cases.find(c => c.id === createdCaseId)?.caseNumber || ""}`, { type: "success" });
            setStep("done");
            addBot(t("chat_welcome"), { actions: [
                { label: t("chat_start_new"), value: "new" },
            ]});
        };

        const generatePdf = async () => {
            const c = db.cases.find(c => c.id === createdCaseId);
            if (!c) return;
            const sr = db.screeningResults.filter(r => r.caseId === createdCaseId);
            const er = db.embargoResults.filter(r => r.caseId === createdCaseId);
            const cr = db.classificationResults.filter(r => r.caseId === createdCaseId);
            const eur = db.endUseResults.filter(r => r.caseId === createdCaseId);
            const audit = db.auditLog.filter(a => a.caseId === createdCaseId);
            await PDFGenerator.generate(c, sr, er, cr, eur, audit, null, db.users, t, language, COUNTRIES);
            addBot(`📄 ${t("pdf_generate")} ✓`, { type: "info" });
        };

        const resetChat = () => {
            setMessages([]);
            setStep("welcome");
            setCaseData({ parties: [], dispatchCountry: "DE", destinationCountry: "", transitCountries: [],
                productType: "", productDescription: "", endUseDescription: "",
                plannedDeliveryDate: "", valueEur: "", quantity: "" });
            setCurrentParty({ name: "", country: "", role: "buyer" });
            setUploadedDocs([]);
            setDocAnalysis(null);
            setCreatedCaseId(null);
            setScreeningDone(false);
            setEndUseStep(0);
            setEndUseResponses([]);
            setTimeout(() => {
                addBot(t("chat_welcome"), { actions: [
                    { label: t("chat_new_case"), value: "new_case" },
                    { label: t("chat_upload_doc"), value: "upload_doc" },
                ]});
            }, 100);
        };

        return { messages, step, processInput, handleFileUpload, resetChat, createdCaseId };
    }

                        placeholder: t("common_search") + "...",

                React.createElement("div", { className: "flex-1 overflow-y-auto px-2 pb-2 space-y-0.5" },

    }

    // --- Chat Message Components ---
    function BotMessage({ message }) {
        const lines = (message.content || "").split("\n");
        return React.createElement("div", { className: "flex gap-3 animate-fade-in" },
            React.createElement("div", { className: "w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0" },
                React.createElement(SvgIcon, { type: "shield", size: 16, className: "text-blue-600" }),
            ),
            React.createElement("div", { className: "flex-1 max-w-xl" },
                React.createElement("div", { className: `rounded-2xl rounded-tl-sm px-4 py-3 text-sm ${
                    message.type === "assessment" ? "bg-blue-50 border border-blue-200" :
                    message.type === "success" ? "bg-green-50 border border-green-200" :
                    message.type === "loading" ? "bg-amber-50 border border-amber-200" :
                    "bg-white border border-gray-200 shadow-sm"
                }` },
                    lines.map((line, i) => {
                        // Simple markdown bold
                        const parts = line.split(/\*\*(.*?)\*\*/g);
                        return React.createElement("div", { key: i, className: line === "" ? "h-2" : "leading-relaxed" },
                            parts.map((part, j) => j % 2 === 1
                                ? React.createElement("strong", { key: j }, part)
                                : React.createElement("span", { key: j }, part)
                            ),
                        );
                    }),
                ),
                message.type === "loading" && React.createElement("div", { className: "flex gap-1 mt-2 ml-2" },
                    [0, 1, 2].map(i => React.createElement("div", {
                        key: i, className: "w-2 h-2 bg-blue-400 rounded-full animate-pulse",
                        style: { animationDelay: `${i * 0.2}s` },
                    })),
                ),
            ),
        );
    }

    function UserMessage({ message }) {
        return React.createElement("div", { className: "flex justify-end animate-fade-in" },
            React.createElement("div", { className: "max-w-md" },
                React.createElement("div", { className: "bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm" },
                    message.content,
                ),
            ),
        );
    }

    function QuickActions({ actions, onAction }) {
        if (!actions || actions.length === 0) return null;
        return React.createElement("div", { className: "flex flex-wrap gap-2 ml-11 animate-fade-in" },
            actions.map((a, i) =>
                React.createElement("button", {
                    key: i,
                    className: "px-3 py-1.5 bg-white border border-blue-200 text-blue-700 rounded-full text-xs font-medium hover:bg-blue-50 hover:border-blue-400 transition shadow-sm",
                    onClick: () => onAction(a.value, a.label),
                }, a.label),
            ),
        );
    }

    // --- Main Chat View ---
    function ChatView() {
        const { t, language } = useI18n();
        const { messages, step, processInput, handleFileUpload, resetChat } = useChatEngine();
        const [inputText, setInputText] = useState("");
        const messagesEndRef = useRef(null);
        const fileInputRef = useRef(null);

        useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages]);

        const handleSend = () => {
            if (!inputText.trim()) return;
            processInput(inputText.trim());
            setInputText("");
        };

        const handleKeyDown = (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        };

        const handleFile = (e) => {
            const files = Array.from(e.target.files || []);
            if (files.length > 0) {
                handleFileUpload(files);
            }
            e.target.value = "";
        };

        // Find the last message with actions (only show actions on the last one)
        const lastActionIdx = (() => {
            for (let i = messages.length - 1; i >= 0; i--) {
                if (messages[i].actions && messages[i].actions.length > 0) return i;
            }
            return -1;
        })();

        const isInputDisabled = step === "running_screening";

        return React.createElement("div", { className: "flex flex-col h-full" },
            // Messages area
            React.createElement("div", { className: "flex-1 overflow-y-auto px-4 py-6" },
                React.createElement("div", { className: "max-w-2xl mx-auto space-y-4" },
                    messages.map((msg, idx) =>
                        React.createElement(React.Fragment, { key: msg.id },
                            msg.role === "bot"
                                ? React.createElement(BotMessage, { message: msg })
                                : React.createElement(UserMessage, { message: msg }),
                            // Show quick actions only on the last bot message that has them
                            idx === lastActionIdx && msg.actions &&
                                React.createElement(QuickActions, {
                                    actions: msg.actions,
                                    onAction: (val, label) => processInput(val, "text", label),
                                }),
                            // Show file upload area if requested
                            idx === lastActionIdx && msg.showFileUpload &&
                                React.createElement("div", {
                                    className: "ml-11 border-2 border-dashed border-gray-300 rounded-xl p-4 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition",
                                    onClick: () => fileInputRef.current?.click(),
                                    onDragOver: (e) => { e.preventDefault(); e.currentTarget.classList.add("border-blue-400", "bg-blue-50"); },
                                    onDragLeave: (e) => { e.currentTarget.classList.remove("border-blue-400", "bg-blue-50"); },
                                    onDrop: (e) => { e.preventDefault(); e.currentTarget.classList.remove("border-blue-400", "bg-blue-50"); const files = Array.from(e.dataTransfer.files); if (files.length > 0) handleFileUpload(files); },
                                },
                                    React.createElement(SvgIcon, { type: "file-text", size: 20, className: "text-gray-400 mx-auto mb-1" }),
                                    React.createElement("p", { className: "text-xs text-gray-500" }, t("chat_upload_hint")),
                                ),
                        ),
                    ),
                    React.createElement("div", { ref: messagesEndRef }),
                ),
            ),

            // Input bar
            React.createElement("div", { className: "border-t bg-white px-4 py-3" },
                React.createElement("div", { className: "max-w-2xl mx-auto flex items-center gap-2" },
                    React.createElement("input", { ref: fileInputRef, type: "file", accept: ".pdf,.txt,.csv,.doc,.docx", multiple: true, className: "hidden", onChange: handleFile }),
                    React.createElement("button", {
                        className: "flex items-center gap-1.5 px-3 py-2.5 text-gray-800 hover:text-blue-700 transition rounded-lg hover:bg-blue-50 border border-gray-300 hover:border-blue-400 text-sm font-semibold",
                        onClick: () => fileInputRef.current?.click(),
                        title: t("chat_upload_doc"),
                    },
                        React.createElement(SvgIcon, { type: "file-text", size: 18 }),
                        React.createElement("span", { className: "hidden sm:inline" }, t("chat_upload_btn_label")),
                    ),
                    React.createElement("input", {
                        type: "text",
                        className: "flex-1 bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition",
                        placeholder: t("chat_type_message"),
                        value: inputText,
                        onChange: (e) => setInputText(e.target.value),
                        onKeyDown: handleKeyDown,
                        disabled: isInputDisabled,
                    }),
                    React.createElement("button", {
                        className: `p-2.5 rounded-lg transition ${inputText.trim() ? "bg-blue-600 text-white hover:bg-blue-700 shadow-sm" : "bg-gray-800 text-white hover:bg-gray-700"}`,
                        onClick: handleSend,
                        disabled: !inputText.trim() || isInputDisabled,
                    },
                        React.createElement(SvgIcon, { type: "send", size: 18 }),
                    ),
                ),
            ),
        );
    }

                    React.createElement("div", { className: "bg-white rounded-xl border p-4" },

                        caseData.parties.map((p, i) =>

                            ),
                        ),
                    ),
                    // Countries + Product
                    React.createElement("div", { className: "bg-white rounded-xl border p-4 text-xs text-gray-600 space-y-1" },
                        React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-2" }, t("chat_product_label")),
                        React.createElement("div", null, `${tCountry(caseData.dispatchCountry)} → ${tCountry(caseData.destinationCountry)}`),
                        React.createElement("div", { className: "font-medium" }, PRODUCT_TYPES[caseData.productType]?.[language] || caseData.productType),
                        React.createElement("div", { className: "text-gray-500" }, caseData.productDescription),
                    ),
                ),

                // Documents
                documents.length > 0 && React.createElement("div", { className: "bg-white rounded-xl border p-4 mb-4" },
                    React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-2" }, `📎 ${language === "de" ? "Dokumente" : "Documents"}`),
                    documents.map((doc, i) =>
                        React.createElement("div", { key: i, className: "text-xs text-gray-600 py-1 flex items-center gap-2" },
                            React.createElement(SvgIcon, { type: "file-text", size: 14, className: "text-gray-400" }),
                            React.createElement("span", { className: "font-medium" }, doc.fileName),
                            React.createElement("span", { className: "text-gray-400" }, `${doc.extractedText?.length || 0} chars`),
                        ),
                    ),
                ),

                // Assessment
                caseData.consolidatedReasoning && React.createElement("div", { className: "bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4" },
                    React.createElement("h3", { className: "font-semibold text-blue-800 text-sm mb-2 flex items-center gap-2" },
                        React.createElement(SvgIcon, { type: "check-circle", size: 16 }),
                        t("chat_assessment_title"),
                    ),
                    React.createElement("div", { className: "text-xs text-blue-700" }, caseData.consolidatedReasoning),
                ),

                // Pillar Results
                React.createElement("div", { className: "space-y-4 mb-6" },
                    React.createElement("div", { className: "bg-white rounded-xl border p-4" },
                        React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-2" }, t("screening_title")),
                        React.createElement(ScreeningResultView, { caseId }),
                    ),
                    React.createElement("div", { className: "bg-white rounded-xl border p-4" },
                        React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-2" }, t("embargo_title")),
                        embargoResults.length > 0
                            ? React.createElement(EmbargoResultView, { caseId })
                            : React.createElement("p", { className: "text-xs text-gray-400" }, "—"),
                    ),
                    React.createElement("div", { className: "bg-white rounded-xl border p-4" },
                        React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-2 flex items-center gap-2" },
                            t("classification_title"), React.createElement(KIBadge)),
                        React.createElement(ClassificationView, { caseId }),
                    ),
                    endUseResults.length > 0 && React.createElement("div", { className: "bg-white rounded-xl border p-4" },

                React.createElement("div", { className: "bg-white rounded-xl border p-4" },
                    React.createElement("h3", { className: "font-semibold text-gray-700 text-sm mb-3" }, t("audit_title")),
                    auditEntries.map(entry => {
                        const user = getUserById(entry.userId);
                        return React.createElement("div", { key: entry.id, className: "flex gap-3 text-xs py-1" },

                            React.createElement("div", null,
                                React.createElement("span", { className: "text-gray-700 font-medium" }, t("audit_action_" + entry.action)),
                                React.createElement("span", { className: "text-gray-400 ml-2" }, `${user?.fullName || "System"} — ${formatDate(entry.timestamp)}`),
                            ),
                        );
                    }),
                ),
            ),
        );
    }

    // --- Settings Page (kept from previous) ---
    function SettingsPage() {
        const { t } = useI18n();
        const { db, updateConfig } = useData();
        const [anthropicKey, setAnthropicKey] = useState(db.config.anthropicApiKey);
        const [openaiKey, setOpenaiKey] = useState(db.config.openaiApiKey);
        const [opensanctionsKey, setOpensanctionsKey] = useState(db.config.opensanctionsApiKey);
        const [demoMode, setDemoMode] = useState(db.config.useDemoData);
        const [saved, setSaved] = useState(false);

        const handleSave = () => {
            updateConfig({ anthropicApiKey: anthropicKey, openaiApiKey: openaiKey, opensanctionsApiKey: opensanctionsKey, useDemoData: demoMode });
            setSaved(true); setTimeout(() => setSaved(false), 2000);
        };

        return React.createElement("div", { className: "animate-fade-in max-w-2xl mx-auto p-6" },
            React.createElement("h1", { className: "text-2xl font-bold text-gray-800 mb-6" }, t("settings_title")),
            React.createElement("div", { className: "bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6" },
                React.createElement("p", { className: "text-sm text-amber-700" }, t("settings_prototype_warning")),
            ),
            React.createElement("div", { className: "bg-white rounded-xl border p-6 mb-6 space-y-4" },
                React.createElement("h2", { className: "font-semibold text-gray-700" }, t("settings_api_keys")),
                [["Anthropic", anthropicKey, setAnthropicKey, "sk-ant-..."],
                 ["OpenAI", openaiKey, setOpenaiKey, "sk-..."],
                 ["OpenSanctions", opensanctionsKey, setOpensanctionsKey, "optional"]].map(([label, val, setter, ph]) =>

                        React.createElement("label", { className: "block text-xs font-medium text-gray-600 mb-1" }, label),
                        React.createElement("input", {
                            type: "password", className: "w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400/30",
                            value: val, onChange: (e) => setter(e.target.value), placeholder: ph,
                        }),
                    ),
                ),
            ),
            React.createElement("div", { className: "bg-white rounded-xl border p-6 mb-6" },
                React.createElement("div", { className: "flex items-center justify-between" },
                    React.createElement("div", null,
                        React.createElement("h3", { className: "font-medium text-gray-700" }, t("settings_demo_mode")),

                        onClick: () => setDemoMode(!demoMode),

                    className: "px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium",
                    onClick: handleSave,
                }, saved ? `✓ ${t("settings_saved")}` : t("settings_save")),
            ),
        );
    }

    // --- Monitoring Page (kept) ---
    function MonitoringPage() {
        const { t, language } = useI18n();
        const { db } = useData();

        return React.createElement("div", { className: "animate-fade-in max-w-3xl mx-auto p-6" },
            React.createElement("h1", { className: "text-2xl font-bold text-gray-800 mb-6" }, t("nav_monitoring")),
            React.createElement("div", { className: "bg-white rounded-xl border p-6" },
                React.createElement("h2", { className: "font-semibold text-gray-700 mb-4" }, language === "de" ? "Rechtsquellen-Status" : "Legal Source Status"),
                React.createElement("div", { className: "space-y-3" },
                    db.legalSourceVersions.filter(s => s.isCurrent).map(source => {
                        const hoursAgo = Math.round((Date.now() - new Date(source.fetchedAt).getTime()) / 3600000);
                        const isStale = hoursAgo > db.config.sourceStalenessHours;
                        return React.createElement("div", { key: source.id, className: `flex items-center justify-between p-4 rounded-lg ${isStale ? "bg-amber-50 border border-amber-200" : "bg-green-50 border border-green-200"}` },
                            React.createElement("div", null,
                                React.createElement("div", { className: "font-medium text-sm" }, source.sourceName),
                                React.createElement("div", { className: "text-xs text-gray-500" }, source.celexNumber),
                            ),
                            React.createElement("div", { className: "text-right" },
                                React.createElement("div", { className: `text-xs font-medium ${isStale ? "text-amber-600" : "text-green-600"}` },
                                    isStale ? (language === "de" ? "Nicht aktuell" : "Outdated") : (language === "de" ? "Aktuell" : "Current")),
                                React.createElement("div", { className: "text-xs text-gray-400" },
                                    language === "de" ? `Vor ${hoursAgo}h abgerufen` : `Fetched ${hoursAgo}h ago`),
                            ),
                        );
                    }),
                ),
            ),
        );
    }

    // ══════════════════════════════════════════════════════════════════
    // ABSCHNITT 5: APP (Chat-zentrische Architektur)
    // ══════════════════════════════════════════════════════════════════

    function AppContent() {
        const { t } = useI18n();
        const { currentUser } = useAuth();
        const { db } = useData();
        const [currentPage, setCurrentPage] = useState("chat");
        const [reviewCaseId, setReviewCaseId] = useState(null);
        const [gateUnlocked, setGateUnlocked] = useState(false);

        if (!gateUnlocked) {
            return React.createElement(PasswordGate, { onSuccess: () => setGateUnlocked(true) });
        }

        if (!currentUser) {
            return React.createElement(LoginPage);
        }

        const handleSelectCase = (caseId) => {
            setReviewCaseId(caseId);
            setCurrentPage("review");
        };

        const handleNewChat = () => {
            setReviewCaseId(null);
            setCurrentPage("chat");
        };

        let mainContent;
        switch (currentPage) {
            case "chat":
                mainContent = React.createElement(ChatView);
                break;
            case "review":
                mainContent = React.createElement(CaseReviewPanel, {
                    caseId: reviewCaseId,
                    onBack: handleNewChat,
                });
                break;
            case "settings":
                mainContent = React.createElement(SettingsPage);
                break;
            case "monitoring":
                mainContent = React.createElement(MonitoringPage);
                break;
            default:
                mainContent = React.createElement(ChatView);
        }

        return React.createElement("div", { className: "flex h-screen bg-gray-50" },
            React.createElement(ChatSidebar, {
                onSelectCase: handleSelectCase,
                onNewChat: handleNewChat,
                activeCaseId: reviewCaseId,
                currentPage,
                setCurrentPage,
            }),
            React.createElement("div", { className: "flex-1 flex flex-col overflow-hidden" },
                // Header bar
                React.createElement("div", { className: "h-12 border-b bg-white flex items-center justify-between px-4 flex-shrink-0" },
                    React.createElement("div", { className: "text-sm text-gray-500" },
                        currentPage === "review" && reviewCaseId
                            ? `${t("chat_reviewing")}: ${db.cases.find(c => c.id === reviewCaseId)?.caseNumber || ""}`
                            : currentPage === "chat" ? t("app_subtitle") : "",
                    ),
                    React.createElement("div", { className: "flex items-center gap-3" },
                        React.createElement(LanguageSwitcher),
                        React.createElement("span", { className: "text-sm text-gray-600" }, currentUser.fullName),
                        React.createElement("button", {
                            className: "text-xs text-gray-400 hover:text-red-500 transition",
                            onClick: () => window.location.reload(),
                        }, "Logout"),
                    ),
                ),
                // Main area
                React.createElement("div", { className: "flex-1 overflow-hidden" }, mainContent),
            ),
        );
    }

    function App() {
        return React.createElement(I18nProvider, null,
            React.createElement(DataProvider, null,
                React.createElement(AuthProvider, null,
                    React.createElement(AppContent),
                ),
            ),
        );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    </script>
